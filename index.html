<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Budget Planner</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class' }
    </script>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #d1d5db; border-radius: 20px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #374151; }
        body { background-color: #f9fafb; color: #111827; }
        .dark body { background-color: #030712; color: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 transition-colors duration-200">
    <div id="root">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; color: #9ca3af; font-family: sans-serif;">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
        </div>
    </div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useMemo, useEffect } = React;

        // ==========================================
        // 🚨 YOUR SUPABASE CREDENTIALS GO HERE 🚨
        // ==========================================
        const SUPABASE_URL = 'https://gbiwzdttszkwgnsqgsxy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdiaXd6ZHR0c3prd2duc3Fnc3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjY1ODcsImV4cCI6MjA5MTMwMjU4N30.YuwtOV41HdFPU7iNm1kCWk49j80HBV2K6Ber0MnNKxI';
        
        const isSupabaseConfigured = SUPABASE_URL !== 'YOUR_SUPABASE_PROJECT_URL';
        const supabaseClient = isSupabaseConfigured ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        // --- Helpers ---
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substring(2);
        
        const getDeviceId = () => {
            let id = window.localStorage.getItem('budget_device_id');
            if (!id) {
                id = 'device_' + generateId();
                window.localStorage.setItem('budget_device_id', id);
            }
            return id;
        };
        const DEVICE_ID = getDeviceId();

        // --- Preset Data ---
        const ACCOUNT_TYPES = [
          { name: 'Liquid', color: '#3b82f6' }, { name: 'Equity', color: '#8b5cf6' },      
          { name: 'Debt', color: '#f97316' }, { name: 'Retirement', color: '#22c55e' }   
        ];

        const ICONS_LIST = ['ph-tag', 'ph-house', 'ph-shopping-cart', 'ph-lightning', 'ph-film-strip', 'ph-monitor-play', 'ph-car', 'ph-dots-three-circle', 'ph-money', 'ph-laptop', 'ph-trend-up', 'ph-fork-knife'];

        const normalizeSubcats = (subs) => (subs || []).map(s => typeof s === 'string' ? { name: s, icon: 'ph-tag' } : s);

        const EXPENSE_CATEGORIES = [
          { name: 'Rent', color: '#ef4444', icon: 'ph-house', subcategories: [] },         
          { name: 'Groceries', color: '#f97316', icon: 'ph-shopping-cart', subcategories: [{name: 'Food', icon: 'ph-fork-knife'}] },    
          { name: 'Utilities', color: '#eab308', icon: 'ph-lightning', subcategories: [{name: 'Electricity', icon: 'ph-lightning'}] }
        ];

        const INCOME_CATEGORIES = [
          { name: 'Salary', color: '#22c55e', icon: 'ph-money', subcategories: [] },
          { name: 'Investments', color: '#14b8a6', icon: 'ph-trend-up', subcategories: [] }
        ];

        const INITIAL_TRANSACTIONS = [];

        // --- Supabase Sync Hook ---
        function useSupabaseSyncedState(key, initialValue) {
          const [state, setState] = useState(initialValue);
          const [isLoaded, setIsLoaded] = useState(false);

          // 1. Initial Load
          useEffect(() => {
            const loadData = async () => {
                if (!supabaseClient) {
                    const local = window.localStorage.getItem(key);
                    if (local) setState(JSON.parse(local));
                    setIsLoaded(true);
                    return;
                }

                try {
                    const { data, error } = await supabaseClient
                        .from('app_data')
                        .select('value')
                        .eq('user_id', DEVICE_ID)
                        .eq('key', key)
                        .single();

                    if (data && data.value) {
                        setState(data.value);
                    } else {
                        // Create initial record
                        await supabaseClient.from('app_data').insert([{ user_id: DEVICE_ID, key, value: initialValue }]);
                        setState(initialValue);
                    }
                } catch (e) {
                    console.warn("Supabase fetch failed, falling back locally:", e);
                    const local = window.localStorage.getItem(key);
                    if (local) setState(JSON.parse(local));
                }
                setIsLoaded(true);
            };
            loadData();
          }, [key]);

          // 2. Realtime Subscription (Listen for changes from other devices)
          useEffect(() => {
              if (!supabaseClient || !isLoaded) return;

              const channel = supabaseClient
                .channel(`public:app_data:user_id=eq.${DEVICE_ID}`)
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'app_data', filter: `user_id=eq.${DEVICE_ID}` }, 
                (payload) => {
                    if (payload.new.key === key) {
                        setState(payload.new.value);
                        window.localStorage.setItem(key, JSON.stringify(payload.new.value));
                    }
                }).subscribe();

              return () => { supabaseClient.removeChannel(channel); }
          }, [key, isLoaded]);

          // 3. Write Data
          const setSyncedState = async (newValueOrUpdater) => {
            setState(prev => {
              const newValue = typeof newValueOrUpdater === 'function' ? newValueOrUpdater(prev) : newValueOrUpdater;
              
              // Save locally instantly for fast UI
              window.localStorage.setItem(key, JSON.stringify(newValue));
              
              // Push to Supabase in background
              if (supabaseClient) {
                  supabaseClient.from('app_data')
                    .update({ value: newValue })
                    .eq('user_id', DEVICE_ID)
                    .eq('key', key)
                    .then(({error}) => { if(error) console.error("Sync error:", error) });
              }
              return newValue;
            });
          };

          return [state, setSyncedState, isLoaded];
        }

        // --- Helper Components ---
        const Card = ({ children, className = '' }) => (
          <div className={`bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-lg overflow-hidden transition-colors duration-200 ${className}`}>
            {children}
          </div>
        );

        // --- Main Dashboard ---
        function App() {
          const currentDate = new Date();
          
          const [theme, setTheme, themeLoaded] = useSupabaseSyncedState('budget_theme', 'dark');

          useEffect(() => {
            if (themeLoaded) {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }
          }, [theme, themeLoaded]);

          const [transactions, setTransactions, txLoaded] = useSupabaseSyncedState('budget_transactions', INITIAL_TRANSACTIONS);
          const [accounts, setAccounts, accLoaded] = useSupabaseSyncedState('budget_accounts', [
            { id: 'default', name: 'Main Account', type: 'Liquid', openingBalance: 0 }
          ]);
          const [currentAccountId, setCurrentAccountId, curAccLoaded] = useSupabaseSyncedState('budget_current_account', 'all');
          const [currency, setCurrency, curLoaded] = useSupabaseSyncedState('budget_currency', 'INR');
          const [expenseCategories, setExpenseCategories, expCatLoaded] = useSupabaseSyncedState('budget_expense_cats', EXPENSE_CATEGORIES);
          const [incomeCategories, setIncomeCategories, incCatLoaded] = useSupabaseSyncedState('budget_income_cats', INCOME_CATEGORIES);
          const [categoryBudgets, setCategoryBudgets, budgLoaded] = useSupabaseSyncedState('budget_category_budgets', {});
          
          const allLoaded = themeLoaded && txLoaded && accLoaded && curAccLoaded && curLoaded && expCatLoaded && incCatLoaded && budgLoaded;

          const [isSettingsOpen, setIsSettingsOpen] = useState(false);
          const [settingsTab, setSettingsTab] = useState('accounts');

          const [filterMonth, setFilterMonth] = useState((currentDate.getMonth() + 1).toString());
          const [filterYear, setFilterYear] = useState(currentDate.getFullYear().toString());

          const [listFilterCategory, setListFilterCategory] = useState('all');
          const [listFilterSubcategory, setListFilterSubcategory] = useState('all');
          
          const [selectedParentCategory, setSelectedParentCategory] = useState(null);

          const [formData, setFormData] = useState({
            type: 'expense', category: 'Groceries', subcategory: '', amount: '', description: '',
            date: new Date().toISOString().split('T')[0], accountId: '', fromAccountId: '', toAccountId: '', isInvestment: false
          });

          const [statusMessage, setStatusMessage] = useState(null);

          const currencySymbol = useMemo(() => {
            if (!allLoaded) return '$';
            const parts = new Intl.NumberFormat('en-IN', { style: 'currency', currency: currency }).formatToParts(0);
            return parts.find(p => p.type === 'currency')?.value || '$';
          }, [currency, allLoaded]);

          const formatCurrency = (amount) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: currency, maximumFractionDigits: 2 }).format(amount);

          const activeTransactions = useMemo(() => {
            if (!allLoaded) return [];
            return transactions.filter(t => {
              const isAccountMatch = currentAccountId === 'all' || t.accountId === currentAccountId || t.fromAccountId === currentAccountId || t.toAccountId === currentAccountId;
              if (!isAccountMatch) return false;
              if (filterYear === 'all') return true;
              if (!t.date) return false;
              const [y, m] = t.date.split('-');
              if (parseInt(y, 10) !== Number(filterYear)) return false;
              if (filterMonth !== 'all' && parseInt(m, 10) !== Number(filterMonth)) return false;
              return true;
            }).sort((a, b) => new Date(b.date) - new Date(a.date));
          }, [transactions, currentAccountId, filterMonth, filterYear, allLoaded]);

          const { totalIncome, totalExpenses, balance } = useMemo(() => {
            let income = 0, expenses = 0;
            activeTransactions.forEach(t => {
              if (t.type === 'income') income += parseFloat(t.amount);
              if (t.type === 'expense') expenses += parseFloat(t.amount);
            });
            return { totalIncome: income, totalExpenses: expenses, balance: income - expenses };
          }, [activeTransactions]);

          const handleInputChange = (e) => {
            const { name, value, type, checked } = e.target;
            setFormData(prev => ({ ...prev, [name]: type === 'checkbox' ? checked : value }));
          };

          const handleAddTransaction = (e) => {
            e.preventDefault();
            
            // --- Math Operation Parser ---
            let finalAmount = formData.amount.toString().trim();
            if (finalAmount.startsWith('=')) {
                try {
                    const mathExpr = finalAmount.substring(1).replace(/[^0-9+\-*/.()]/g, '');
                    finalAmount = new Function('return ' + mathExpr)();
                } catch (err) {
                    setStatusMessage({ type: 'error', text: 'Invalid math expression.' });
                    setTimeout(() => setStatusMessage(null), 3000);
                    return;
                }
            }

            const parsedAmount = parseFloat(finalAmount);
            if (isNaN(parsedAmount) || parsedAmount <= 0) return;

            const newTransaction = { ...formData, amount: parsedAmount, id: generateId() };
            setTransactions(prev => [newTransaction, ...prev]);
            setFormData(prev => ({ ...prev, amount: '', description: '', subcategory: '', isInvestment: false })); 
          };

          const handleDelete = (id) => setTransactions(prev => prev.filter(t => t.id !== id));

          if (!allLoaded) {
              return <div className="flex justify-center items-center h-screen"><div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div></div>;
          }

          return (
            <div className="min-h-screen text-gray-900 dark:text-gray-100 p-4 sm:p-8 transition-colors duration-200">
              <div className="max-w-5xl mx-auto space-y-6">
                
                <header className="flex justify-between items-center">
                  <h1 className="text-2xl font-bold flex items-center gap-2 dark:text-white">
                    <i className="ph ph-database text-blue-500"></i> Supabase Budget
                  </h1>
                  <div className="flex gap-2">
                    {!isSupabaseConfigured && <span className="bg-orange-500/20 text-orange-600 px-3 py-1 rounded-lg text-sm font-bold flex items-center gap-2"><i className="ph ph-warning"></i> Local Mode</span>}
                    {isSupabaseConfigured && <span className="bg-green-500/20 text-green-600 px-3 py-1 rounded-lg text-sm font-bold flex items-center gap-2"><i className="ph ph-cloud-check"></i> Cloud Synced</span>}
                    <button onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} className="p-2 bg-white dark:bg-gray-800 rounded-lg"><i className={`ph ${theme === 'dark' ? 'ph-sun' : 'ph-moon'} text-[20px]`}></i></button>
                  </div>
                </header>

                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                  <Card className="p-5"><div className="text-sm text-gray-500">Income</div><div className="text-2xl font-bold text-green-500">{formatCurrency(totalIncome)}</div></Card>
                  <Card className="p-5"><div className="text-sm text-gray-500">Expenses</div><div className="text-2xl font-bold text-red-500">{formatCurrency(totalExpenses)}</div></Card>
                  <Card className="p-5"><div className="text-sm text-gray-500">Balance</div><div className="text-2xl font-bold dark:text-white">{formatCurrency(balance)}</div></Card>
                </div>

                {statusMessage && <div className="bg-red-500/10 text-red-500 px-4 py-3 rounded-lg text-sm">{statusMessage.text}</div>}

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                  <Card className="p-6 lg:col-span-1 h-fit">
                    <h2 className="text-lg font-semibold mb-4">New Transaction</h2>
                    <form onSubmit={handleAddTransaction} className="space-y-4">
                      <select name="type" value={formData.type} onChange={handleInputChange} className="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg py-2 px-3 focus:outline-none focus:border-blue-500">
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                      </select>
                      <input type="text" name="amount" value={formData.amount} onChange={handleInputChange} placeholder="Amount (e.g. 500 or =100*5)" required className="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg py-2 px-3 focus:outline-none focus:border-blue-500" />
                      <select name="category" value={formData.category} onChange={handleInputChange} className="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg py-2 px-3 focus:outline-none focus:border-blue-500">
                        {(formData.type === 'expense' ? expenseCategories : incomeCategories).map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                      </select>
                      <input type="text" name="description" value={formData.description} onChange={handleInputChange} placeholder="Description" className="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg py-2 px-3 focus:outline-none focus:border-blue-500" />
                      <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg">Add {formData.type}</button>
                    </form>
                  </Card>

                  <Card className="p-6 lg:col-span-2">
                    <h2 className="text-lg font-semibold mb-4">Recent Transactions</h2>
                    <div className="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                      {activeTransactions.map((t) => (
                        <div key={t.id} className="flex justify-between p-3 rounded-lg border bg-gray-50 dark:bg-gray-900/50 border-gray-200 dark:border-gray-800">
                          <div>
                            <div className="font-bold">{t.category}</div>
                            <div className="text-sm text-gray-500">{t.description || 'No description'} • {t.date}</div>
                          </div>
                          <div className="flex items-center gap-4">
                            <span className={`font-semibold ${t.type === 'income' ? 'text-green-500' : 'dark:text-white'}`}>
                              {t.type === 'expense' ? '-' : ''}{formatCurrency(t.amount)}
                            </span>
                            <button onClick={() => handleDelete(t.id)} className="text-gray-400 hover:text-red-500"><i className="ph ph-trash"></i></button>
                          </div>
                        </div>
                      ))}
                      {activeTransactions.length === 0 && <p className="text-gray-500 text-center py-4">No transactions yet.</p>}
                    </div>
                  </Card>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
