                        <div className="flex items-center justify-between mb-6 gap-4">
                          <h2 className="text-lg font-semibold flex items-center gap-2 text-gray-900 dark:text-white">
                            <i className="ph ph-trend-up text-gray-400 text-[20px]"></i> Investment Overview
                          </h2>
                        </div>
                        <div className="flex flex-col items-center justify-center gap-6 flex-1">
                          <div className="w-full flex justify-center shrink-0">
                            {renderDonutChart(totalInvestments, investmentsByTag, 'No investments in\nselected period', 'ph-trend-up')}
                          </div>
                          <div className="w-full max-h-32 overflow-y-auto pr-2 space-y-2 custom-scrollbar">
                            {investmentsByTag.length > 0 ? investmentsByTag.map((category) => (
                              <div key={category.name} className="flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                  <div className="w-3 h-3 rounded-full shrink-0" style={{ backgroundColor: category.color }}></div>
                                  <span className="text-sm text-gray-700 dark:text-gray-300 truncate" title={category.name}>{category.name}</span>
                                </div>
                                <div className="text-sm font-medium text-gray-900 dark:text-white pl-2 shrink-0">{formatCurrency(category.value)}</div>
                              </div>
                            )) : <div className="text-sm text-gray-500 text-center">No investments to display</div>}
                          </div>
                        </div>
                      </Card>
                    </div>

                    {/* Spending Trend Chart */}
                    <Card className="p-6 flex flex-col">
                      <div className="flex items-center justify-between mb-6 gap-4">
                        <h2 className="text-lg font-semibold flex items-center gap-2 text-gray-900 dark:text-white">
                          <i className="ph ph-chart-line-up text-gray-400 text-[20px]"></i> 
                          Spending Trend
                        </h2>
                      </div>
                      <div className="flex-1 w-full">
                        {renderTrendChart()}
                      </div>
                    </Card>

                    {/* Transaction History Section */}
                    <Card className="p-6 flex-1">
                      <div className="flex items-center justify-between mb-3">
                        <h2 className="text-lg font-semibold flex items-center gap-2 text-gray-900 dark:text-white">
                          <i className="ph ph-receipt text-gray-400 text-[20px]"></i> Transactions
                        </h2>
                      </div>

                      <div className="flex flex-wrap items-center gap-2 mb-4 p-2.5 bg-gray-50 dark:bg-gray-900 rounded-lg border border-gray-200 dark:border-gray-800 text-sm">
                        <i className="ph ph-funnel text-gray-400 dark:text-gray-500 ml-1"></i>
                        <select value={listFilterCategory} onChange={(e) => { const val = e.target.value; setListFilterCategory(val); setListFilterSubcategory('all'); if (val === 'all' || val === 'Transfer') { setSelectedParentCategory(null); } else { const isExpense = expenseCategories.some(c => c.name === val); setSelectedParentCategory(isExpense ? val : null); } }} className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded py-1 px-2 text-gray-700 dark:text-gray-300 focus:outline-none focus:border-blue-500 cursor-pointer">
                          <option value="all">All Categories</option>
                          <option value="Transfer">Transfers</option>
                          <optgroup label="Expenses">{expenseCategories.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}</optgroup>
                          <optgroup label="Income">{incomeCategories.map(c => <option key={c.name} value={c.name}>{c.name}</option>)}</optgroup>
                        </select>
                        
                        {availableSubcategoriesFilters.length > 0 && (
                          <select value={listFilterSubcategory} onChange={(e) => setListFilterSubcategory(e.target.value)} className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded py-1 px-2 text-gray-700 dark:text-gray-300 focus:outline-none focus:border-blue-500 cursor-pointer">
                            <option value="all">All Subcategories</option>
                            {availableSubcategoriesFilters.map(sub => <option key={sub} value={sub}>{sub}</option>)}
                          </select>
                        )}

                        <div className="flex items-center gap-1 border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 rounded pl-2 pr-1 py-0.5">
                          <span className="text-gray-500 text-xs">From</span>
                          <input type="date" value={listFilterDateFrom} onChange={e => setListFilterDateFrom(e.target.value)} className="bg-transparent text-gray-700 dark:text-gray-300 focus:outline-none [color-scheme:light] dark:[color-scheme:dark] text-xs cursor-pointer" />
                        </div>
                        <div className="flex items-center gap-1 border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 rounded pl-2 pr-1 py-0.5">
                          <span className="text-gray-500 text-xs">To</span>
                          <input type="date" value={listFilterDateTo} onChange={e => setListFilterDateTo(e.target.value)} className="bg-transparent text-gray-700 dark:text-gray-300 focus:outline-none [color-scheme:light] dark:[color-scheme:dark] text-xs cursor-pointer" />
                        </div>

                        {(listFilterCategory !== 'all' || listFilterSubcategory !== 'all' || listFilterDateFrom || listFilterDateTo) && (
                          <button onClick={clearListFilters} className="text-gray-500 dark:text-gray-400 hover:text-red-500 dark:hover:text-red-400 px-2 py-1 text-xs font-medium transition-colors">Clear</button>
                        )}
                      </div>
                      
                      <div className="space-y-3 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                        {displayedTransactions.length === 0 ? (
                          <p className="text-gray-500 text-center py-6">No matching transactions found.</p>
                        ) : (
                          (showAllTransactions ? displayedTransactions : displayedTransactions.slice(0, 4)).map((transaction) => {
                            const isTransfer = transaction.type === 'transfer';
                            const isTransferIn = isTransfer && transaction.toAccountId === (currentAccountId === 'all' ? null : currentAccountId);
                            const isIncome = transaction.type === 'income' || isTransferIn;
                            
                            const catObj = isTransfer ? null : (isIncome ? incomeCategories.find(c=>c.name===transaction.category) : expenseCategories.find(c=>c.name===transaction.category));
                            const catIcon = isTransfer ? 'ph-arrows-left-right' : (catObj?.icon || 'ph-tag');
                            const catColor = isTransfer ? '#3b82f6' : (catObj?.color || '#9ca3af');
                            const subObj = catObj ? normalizeSubcats(catObj.subcategories).find(s => s.name === transaction.subcategory) : null;
                            const subIcon = subObj?.icon || 'ph-tag';
                            
                            let descText = transaction.description;
                            if (isTransfer && !descText) {
                               const fromAccObj = accounts.find(a => a.id === transaction.fromAccountId);
                               const toAccObj = accounts.find(a => a.id === transaction.toAccountId);
                               const fromAccName = fromAccObj?.name || 'Unknown';
                               const toAccName = toAccObj?.name || 'Unknown';
                               if (currentAccountId === 'all') descText = `${fromAccName} → ${toAccName}`;
                               else descText = (isTransferIn ? `Transfer from ${fromAccName}` : `Transfer to ${toAccName}`);
                            }
                            if (!descText) descText = "No description provided";

                            const displayAccountObj = accounts.find(a => a.id === (isTransfer ? transaction.fromAccountId : transaction.accountId));
                            const displayAccountName = displayAccountObj?.name || 'Unknown Account';

                            return (
                              <div key={transaction.id} className={`flex items-center justify-between p-3 rounded-lg border transition-colors group ${editingTransactionId === transaction.id ? 'bg-blue-50 dark:bg-blue-900/20 border-blue-300 dark:border-blue-500/50' : 'bg-gray-50 dark:bg-gray-900/50 hover:bg-gray-100 dark:hover:bg-gray-900 border-gray-200 dark:border-gray-800'}`}>
                                <div className="flex items-center gap-4 overflow-hidden">
                                  <div className="p-2 rounded-lg shrink-0 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700/50 flex items-center justify-center w-10 h-10">
                                    <i className={`ph ${catIcon} text-[20px]`} style={{color: catColor}}></i>
                                  </div>
                                  <div className="truncate">
                                    <p className="text-sm font-bold text-gray-900 dark:text-gray-100 flex items-center gap-2">
                                      <span className="truncate">{isTransfer ? 'Transfer' : transaction.category}</span>
                                      {transaction.subcategory && (
                                        <>
                                          <i className="ph ph-caret-right text-[12px] text-gray-400 dark:text-gray-500 shrink-0"></i>
                                          <i className={`ph ${subIcon} text-[12px] text-gray-500 dark:text-gray-400 shrink-0`}></i>
                                          <span className="truncate text-gray-700 dark:text-gray-300 font-semibold">{transaction.subcategory}</span>
                                        </>
                                      )}
                                      {transaction.isInvestment && <span className="text-[9px] font-bold uppercase tracking-wider bg-purple-100 dark:bg-purple-500/20 text-purple-600 dark:text-purple-400 px-1.5 py-0.5 rounded shrink-0 border border-purple-200 dark:border-purple-500/30">Inv</span>}
                                      {currentAccountId === 'all' && !isTransfer && <span className="text-[9px] font-semibold uppercase tracking-wider bg-gray-200 dark:bg-gray-800 text-gray-600 dark:text-gray-400 px-1.5 py-0.5 rounded shrink-0 border border-gray-300 dark:border-gray-700 truncate max-w-[100px]">{displayAccountName}</span>}
                                    </p>
                                    <div className="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400 mt-0.5 truncate">
                                      <span className="truncate max-w-[150px] sm:max-w-[200px]">{descText}</span>
                                      <span className="shrink-0">•</span>
                                      <span className="shrink-0">{new Date(transaction.date).toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' })}</span>
                                    </div>
                                  </div>
                                </div>
                                <div className="flex items-center gap-2 shrink-0">
                                  <span className={`font-semibold ${isTransfer ? (currentAccountId === 'all' ? 'text-blue-600 dark:text-blue-400' : (isTransferIn ? 'text-green-600 dark:text-green-500' : 'text-gray-900 dark:text-gray-100')) : (isIncome ? 'text-green-600 dark:text-green-500' : 'text-gray-900 dark:text-gray-100')}`}>
                                    {isIncome || (isTransfer && currentAccountId === 'all') ? '' : '-'}{formatCurrency(transaction.amount)}
                                  </span>
                                  <div className="flex items-center opacity-0 group-hover:opacity-100 transition-opacity ml-2">
                                    <button onClick={() => handleEditTransaction(transaction)} className="text-gray-400 hover:text-blue-500 dark:text-gray-500 dark:hover:text-blue-400 p-1.5 transition-colors" title="Edit"><i className="ph ph-pencil-simple text-[16px]"></i></button>
                                    <button onClick={() => handleDelete(transaction.id)} className="text-gray-400 hover:text-red-500 dark:text-gray-500 dark:hover:text-red-400 p-1.5 transition-colors" title="Delete"><i className="ph ph-trash text-[16px]"></i></button>
                                  </div>
                                </div>
                              </div>
                            );
                          })
                        )}
                      </div>
                      {displayedTransactions.length > 4 && (
                        <div className="mt-4 text-right border-t border-gray-200 dark:border-gray-800 pt-3">
                          <button onClick={() => setShowAllTransactions(!showAllTransactions)} className="text-sm text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors font-medium">
                            {showAllTransactions ? 'Show less' : 'Show all'}
                          </button>
                        </div>
                      )}
                    </Card>

                    <Card className="p-6 flex-1">
                      <div className="flex items-center justify-between mb-6">
                        <h2 className="text-lg font-semibold flex items-center gap-2 text-gray-900 dark:text-white">
                          <i className="ph ph-target text-gray-400 text-[20px]"></i> Category Budgets
                        </h2>
                        <button onClick={() => setIsEditingBudgets(!isEditingBudgets)} className="text-sm text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 font-medium transition-colors bg-blue-50 dark:bg-blue-500/10 px-3 py-1.5 rounded-lg">
                          {isEditingBudgets ? 'Done' : 'Edit Budgets'}
                        </button>
                      </div>

                      <div className="space-y-5 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar">
                        {expenseCategories.map(cat => {
                          const budgetAmount = categoryBudgets[cat.name] || 0;
                          const spentAmount = rawExpensesByCategory[cat.name] || 0;
                          if (!isEditingBudgets && budgetAmount === 0) return null;

                          const percentSpent = budgetAmount > 0 ? (spentAmount / budgetAmount) * 100 : 0;
                          let colorClass = 'bg-green-500';
                          if (percentSpent > 100) colorClass = 'bg-red-500';
                          else if (percentSpent >= 80) colorClass = 'bg-orange-500';

                          return (
                            <div key={cat.name} className="space-y-2">
                              <div className="flex justify-between items-center text-sm">
                                <div className="flex items-center gap-2">
                                  <div className="w-3 h-3 rounded-full" style={{ backgroundColor: cat.color }}></div>
                                  <span className="font-medium text-gray-800 dark:text-gray-200">{cat.name}</span>
                                </div>
                                {isEditingBudgets ? (
                                  <div className="flex items-center gap-2">
                                    <span className="text-gray-400 dark:text-gray-500">{currencySymbol}</span>
                                    <input type="number" min="0" step="1" value={budgetAmount || ''} onChange={(e) => setCategoryBudgets(prev => ({ ...prev, [cat.name]: Number(e.target.value) }))} placeholder="0" className="w-24 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded py-1 px-2 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500 text-right" />
                                  </div>
                                ) : (
                                  <div className="text-gray-500 dark:text-gray-400">
                                    <span className={percentSpent > 100 ? 'text-red-600 dark:text-red-400 font-medium' : 'text-gray-900 dark:text-gray-100 font-medium'}>{formatCurrency(spentAmount)}</span>
                                    <span className="mx-1">/</span>
                                    <span>{formatCurrency(budgetAmount)}</span>
                                  </div>
                                )}
                              </div>
                              {!isEditingBudgets && (
                                <div className="w-full bg-gray-200 dark:bg-gray-800 h-2 rounded-full overflow-hidden">
                                  <div className={`h-full rounded-full transition-all duration-500 ${colorClass}`} style={{ width: `${Math.min(percentSpent, 100)}%` }}></div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                        {!isEditingBudgets && Object.values(categoryBudgets).every(b => !b) && (
                          <div className="text-center text-gray-500 py-4"><p>No budgets set yet.</p><p className="text-sm mt-1">Click 'Edit Budgets' to set spending limits.</p></div>
                        )}
                      </div>
                    </Card>

                  </div>
                </div>

                {/* Settings Modal */}
                {isSettingsOpen && (
                  <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 dark:bg-black/60 backdrop-blur-sm">
                    <div className="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl w-full max-w-md overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                      <div className="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-800/50">
                        <h2 className="text-lg font-semibold flex items-center gap-2 text-gray-900 dark:text-white">
                          <i className="ph ph-gear text-blue-600 dark:text-blue-500 text-[20px]"></i> Settings
                        </h2>
                        <button onClick={() => setIsSettingsOpen(false)} className="text-gray-400 hover:text-gray-600 dark:hover:text-white p-1">
                          <i className="ph ph-x text-[20px]"></i>
                        </button>
                      </div>

                      <div className="flex border-b border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-900 shrink-0">
                        {['accounts', 'categories', 'currency', 'data'].map(tab => (
                          <button key={tab} onClick={() => { setSettingsTab(tab); setStatusMessage(null); }} className={`flex-1 py-3 text-sm font-medium capitalize transition-colors ${settingsTab === tab ? 'text-blue-600 dark:text-blue-400 border-b-2 border-blue-600 dark:border-blue-500 bg-white dark:bg-gray-800/30' : 'text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200'}`}>
                            {tab}
                          </button>
                        ))}
                      </div>

                      <div className="p-5 overflow-y-auto custom-scrollbar flex-1">
                        
                        {settingsTab === 'accounts' && (
                          <div className="space-y-6">
                            <div>
                              <h3 className="text-sm font-medium text-gray-500 dark:text-gray-400 mb-3 uppercase tracking-wider">Manage Accounts</h3>
                              <div className="space-y-3">
                                {accounts.map(acc => {
                                  const accTypeData = ACCOUNT_TYPES.find(at => at.name === (acc.type || 'Liquid'));
                                  const accColor = accTypeData?.color || '#3b82f6';
                                  return (
                                  <div key={acc.id} className="bg-gray-50 dark:bg-gray-800 p-3 rounded-lg border border-gray-200 dark:border-gray-700">
                                    {editingAccount?.id === acc.id ? (
                                      <form onSubmit={handleUpdateAccount} className="space-y-3">
                                        <div className="flex flex-col gap-2">
                                          <div>
                                            <label className="text-xs text-gray-500 mb-1 block">Account Name</label>
                                            <input type="text" value={editingAccount.name} onChange={e => setEditingAccount({...editingAccount, name: e.target.value})} className="w-full bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded py-1.5 px-2 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-blue-500" required />
                                          </div>
                                          <div className="flex gap-2">
                                            <div className="flex-1">
                                              <label className="text-xs text-gray-500 mb-1 block">Account Type</label>
                                              <select value={editingAccount.type} onChange={e => setEditingAccount({...editingAccount, type: e.target.value})} className="w-full bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded py-1.5 px-2 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-blue-500">
                                                {ACCOUNT_TYPES.map(t => <option key={t.name} value={t.name}>{t.name}</option>)}
                                              </select>
                                            </div>
                                            <div className="w-32">
                                              <label className="text-xs text-gray-500 mb-1 block">Opening Bal</label>
                                              <div className="relative">
                                                <span className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 text-sm">{currencySymbol}</span>
                                                <input type="number" step="0.01" value={editingAccount.openingBalance} onChange={e => setEditingAccount({...editingAccount, openingBalance: e.target.value})} className="w-full bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded py-1.5 pl-6 pr-2 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-blue-500" required />
                                              </div>
                                            </div>
                                          </div>
                                        </div>
                                        <div className="flex gap-2 pt-1">
                                          <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors">Save</button>
                                          <button type="button" onClick={() => setEditingAccount(null)} className="bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-800 dark:text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors">Cancel</button>
                                        </div>
                                      </form>
                                    ) : (
                                      <div className="flex items-center justify-between">
                                        <div>
                                          <div className="flex items-center gap-2 mb-1">
                                            <span className="font-medium text-gray-900 dark:text-gray-200 block">{acc.name}</span>
                                            <span className="text-[10px] font-semibold px-1.5 py-0.5 rounded border uppercase tracking-wide" style={{ backgroundColor: `${accColor}20`, borderColor: `${accColor}40`, color: accColor }}>{acc.type || 'Liquid'}</span>
                                          </div>
                                          <span className="text-xs text-gray-500 dark:text-gray-400">Opening Balance: {formatCurrency(acc.openingBalance || 0)}</span>
                                        </div>
                                        <div className="flex items-center gap-1">
                                          <button type="button" onClick={() => setEditingAccount({ id: acc.id, name: acc.name, type: acc.type || 'Liquid', openingBalance: acc.openingBalance || 0 })} className="text-gray-400 hover:text-blue-500 p-1.5 transition-colors" title="Edit account"><i className="ph ph-pencil-simple text-[16px]"></i></button>
                                          {accounts.length > 1 && <button type="button" onClick={() => handleDeleteAccount(acc.id)} className="text-gray-400 hover:text-red-500 p-1.5 transition-colors" title="Delete account"><i className="ph ph-trash text-[16px]"></i></button>}
                                        </div>
                                      </div>
                                    )}
                                  </div>
                                )})}
                              </div>
                            </div>
                            <div className="pt-4 border-t border-gray-200 dark:border-gray-800">
                              <h3 className="text-sm font-medium text-gray-500 dark:text-gray-400 mb-3 uppercase tracking-wider">Add New Account</h3>
                              <form onSubmit={handleAddAccount} className="space-y-3">
                                <div className="flex gap-2">
                                  <div className="flex-1"><input type="text" value={newAccountName} onChange={(e) => setNewAccountName(e.target.value)} placeholder="Account Name" className="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg py-2 px-3 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-blue-500" /></div>
                                  <div className="w-32 relative"><span className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 text-sm">{currencySymbol}</span><input type="number" step="0.01" value={newAccountBalance} onChange={(e) => setNewAccountBalance(e.target.value)} placeholder="0.00" className="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg py-2 pl-6 pr-2 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-blue-500" /></div>
                                </div>
                                <select value={newAccountType} onChange={(e) => setNewAccountType(e.target.value)} className="w-full bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg py-2 px-3 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-blue-500">
                                  {ACCOUNT_TYPES.map(t => <option key={t.name} value={t.name}>{t.name}</option>)}
                                </select>
                                <button type="submit" disabled={!newAccountName} className="w-full bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:bg-gray-200 dark:hover:bg-gray-700 hover:border-blue-500 disabled:opacity-50 text-gray-900 dark:text-white px-4 py-2 rounded-lg font-medium transition-all">Add Account</button>
                              </form>
                            </div>
                          </div>
                        )}

                        {settingsTab === 'categories' && (
                          <div className="space-y-6">
                            <div className="flex bg-gray-100 dark:bg-gray-800 p-1 rounded-lg">
                              <button type="button" onClick={() => setNewCatType('expense')} className={`flex-1 py-1.5 text-sm font-medium rounded-md ${newCatType === 'expense' ? 'bg-white dark:bg-gray-700 text-gray-900 dark:text-white shadow-sm' : 'text-gray-500 dark:text-gray-400'}`}>Expenses</button>
                              <button type="button" onClick={() => setNewCatType('income')} className={`flex-1 py-1.5 text-sm font-medium rounded-md ${newCatType === 'income' ? 'bg-white dark:bg-gray-700 text-gray-900 dark:text-white shadow-sm' : 'text-gray-500 dark:text-gray-400'}`}>Income</button>
                            </div>

                            <div className="space-y-3 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
                              {(newCatType === 'expense' ? expenseCategories : incomeCategories).map(cat => (
                                <div key={cat.name} className="flex flex-col bg-gray-50 dark:bg-gray-800 p-3 rounded-lg border border-gray-200 dark:border-gray-700 space-y-3">
                                  {editingCategory?.originalName === cat.name && editingCategory?.type === newCatType ? (
                                     <form onSubmit={handleUpdateCategory} className="flex flex-col gap-3">
                                        <div className="flex gap-2">
                                          <input type="color" value={editingCategory.color} onChange={e => setEditingCategory({...editingCategory, color: e.target.value})} className="w-8 h-8 rounded cursor-pointer bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 p-0.5 shrink-0" />
                                          <select value={editingCategory.icon} onChange={e => setEditingCategory({...editingCategory, icon: e.target.value})} className="bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded px-2 text-sm text-gray-900 dark:text-white focus:outline-none w-14 shrink-0">
                                            {ICONS_LIST.map(icon => <option key={icon} value={icon}>{icon.replace('ph-', '')}</option>)}
                                          </select>
                                          <input type="text" value={editingCategory.name} onChange={e => setEditingCategory({...editingCategory, name: e.target.value})} className="flex-1 bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded py-1 px-2 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-blue-500" required />
                                        </div>
                                        <div className="flex gap-2">
                                          <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-xs font-medium transition-colors">Save</button>
                                          <button type="button" onClick={() => setEditingCategory(null)} className="bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-800 dark:text-white px-3 py-1 rounded text-xs font-medium transition-colors">Cancel</button>
                                        </div>
                                     </form>
                                  ) : (
                                  <div className="flex items-center justify-between">
                                    <div className="flex items-center gap-3">
                                      <div className="w-6 h-6 rounded-full flex items-center justify-center border border-black/10 dark:border-gray-600/50" style={{ backgroundColor: cat.color }}><i className={`ph ${cat.icon} text-white text-xs`}></i></div>
                                      <span className="font-medium text-gray-900 dark:text-gray-200">{cat.name}</span>
                                    </div>
                                    <div className="flex items-center gap-1">
                                      <button type="button" onClick={() => setEditingCategory({ originalName: cat.name, name: cat.name, color: cat.color, icon: cat.icon || 'ph-tag', type: newCatType })} className="text-gray-400 hover:text-blue-500 p-1"><i className="ph ph-pencil-simple text-[16px]"></i></button>
                                      <button type="button" onClick={() => handleDeleteCategory(cat.name, newCatType)} className="text-gray-400 hover:text-red-500 p-1"><i className="ph ph-trash text-[16px]"></i></button>
                                    </div>
                                  </div>
                                  )}
                                  
                                  <div className="pl-9 pt-2 border-t border-gray-200 dark:border-gray-700/50 space-y-2">
                                    <div className="text-xs text-gray-500 dark:text-gray-400 font-medium uppercase tracking-wider">Subcategories</div>
                                    <div className="flex flex-col gap-2">
                                      {(!cat.subcategories || cat.subcategories.length === 0) && <span className="text-xs text-gray-400 dark:text-gray-600 italic">None</span>}
                                      {normalizeSubcats(cat.subcategories).map(sub => (
                                        editingSubcategory?.originalName === sub.name && editingSubcategory?.categoryName === cat.name && editingSubcategory?.type === newCatType ? (
                                          <form key={sub.name} onSubmit={handleUpdateSubcategory} className="flex items-center gap-2 bg-white dark:bg-gray-900/50 p-1.5 rounded border border-gray-200 dark:border-gray-700">
                                            <select value={editingSubcategory.icon} onChange={e => setEditingSubcategory({...editingSubcategory, icon: e.target.value})} className="bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded px-1 py-1 text-xs text-gray-900 dark:text-white focus:outline-none w-12 shrink-0">
                                              {ICONS_LIST.map(icon => <option key={icon} value={icon}>{icon.replace('ph-', '')}</option>)}
                                            </select>
                                            <input type="text" value={editingSubcategory.name} onChange={e => setEditingSubcategory({...editingSubcategory, name: e.target.value})} className="flex-1 bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded py-1 px-2 text-xs text-gray-900 dark:text-white focus:outline-none focus:border-blue-500" required />
                                            <button type="submit" className="text-blue-600 dark:text-blue-400 hover:text-blue-500 dark:hover:text-blue-300 p-1"><i className="ph ph-check text-[14px]"></i></button>
                                            <button type="button" onClick={() => setEditingSubcategory(null)} className="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 p-1"><i className="ph ph-x text-[14px]"></i></button>
                                          </form>
                                        ) : (
                                          <div key={sub.name} className="flex items-center justify-between bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700/50 rounded p-1.5 text-xs text-gray-700 dark:text-gray-300">
                                            <div className="flex items-center gap-2"><i className={`ph ${sub.icon || 'ph-tag'} text-gray-500 dark:text-gray-400`}></i><span>{sub.name}</span></div>
                                            <div className="flex items-center gap-1">
                                              <button type="button" onClick={() => setEditingSubcategory({ categoryName: cat.name, originalName: sub.name, name: sub.name, icon: sub.icon || 'ph-tag', type: newCatType })} className="text-gray-400 hover:text-blue-500 p-0.5"><i className="ph ph-pencil-simple text-[12px]"></i></button>
                                              <button type="button" onClick={() => handleRemoveSubcategory(cat.name, newCatType, sub.name)} className="text-gray-400 hover:text-red-500 p-0.5"><i className="ph ph-trash text-[12px]"></i></button>
                                            </div>
                                          </div>
                                        )
                                      ))}
                                    </div>
                                    <form onSubmit={(e) => handleAddSubcategory(e, cat.name, newCatType)} className="flex items-center gap-2 mt-2 pt-2 border-t border-gray-200 dark:border-gray-800">
                                      <select name="subcatIcon" className="bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded py-1.5 px-1 text-xs text-gray-900 dark:text-white focus:outline-none w-12 shrink-0">{ICONS_LIST.map(icon => <option key={icon} value={icon}>{icon.replace('ph-', '')}</option>)}</select>
                                      <input name="subcatName" type="text" placeholder="New subcategory..." className="flex-1 bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded py-1.5 px-2 text-xs text-gray-900 dark:text-white focus:outline-none focus:border-blue-500" />
                                      <button type="submit" className="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-800 dark:text-white px-2 py-1.5 rounded text-xs transition-colors font-medium">Add</button>
                                    </form>
                                  </div>
                                </div>
                              ))}
                            </div>

                            <form onSubmit={handleAddCategory} className="space-y-3 pt-4 border-t border-gray-200 dark:border-gray-800">
                              <h3 className="text-sm font-medium text-gray-500 dark:text-gray-400">Add Category</h3>
                              <div className="flex gap-2">
                                <input type="color" value={newCatColor} onChange={(e) => setNewCatColor(e.target.value)} className="w-10 h-10 rounded cursor-pointer bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 p-1 shrink-0" />
                                <select value={newCatIcon} onChange={(e) => setNewCatIcon(e.target.value)} className="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded px-2 text-sm text-gray-900 dark:text-white focus:outline-none w-16 shrink-0">{ICONS_LIST.map(icon => <option key={icon} value={icon}>{icon.replace('ph-', '')}</option>)}</select>
                                <input type="text" value={newCatName} onChange={(e) => setNewCatName(e.target.value)} placeholder="Category Name" className="flex-1 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg py-2 px-3 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500" />
                                <button type="submit" disabled={!newCatName} className="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white px-3 py-2 rounded-lg font-medium">Add</button>
                              </div>
                            </form>
                          </div>
                        )}

                        {settingsTab === 'currency' && (
                          <div className="space-y-4">
                            <h3 className="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Select Currency</h3>
                            <div className="space-y-2">
                              {CURRENCIES.map(curr => (
                                <button key={curr.code} onClick={() => setCurrency(curr.code)} className={`w-full flex items-center justify-between p-3 rounded-lg border transition-colors ${currency === curr.code ? 'bg-blue-50 dark:bg-blue-500/10 border-blue-500 text-blue-600 dark:text-blue-400' : 'bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300'}`}>
                                  <span className="font-medium">{curr.name}</span><span className="text-lg">{curr.code}</span>
                                </button>
                              ))}
                            </div>
                          </div>
                        )}

                        {settingsTab === 'data' && (
                          <div className="space-y-6">
                            <div>
                              <h3 className="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2">Export CSV</h3>
                              <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">Download all your transactions to your device.</p>
                              <button onClick={handleExportData} className="w-full bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-white py-2.5 rounded-lg font-medium transition-colors flex items-center justify-center gap-2">
                                <i className="ph ph-download-simple text-[18px]"></i> Export Data
                              </button>
                            </div>
                            <div className="pt-6 border-t border-gray-200 dark:border-gray-800">
                              <h3 className="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Import CSV</h3>
                              <p className="text-sm text-gray-500 dark:text-gray-400 mt-2 mb-4">Upload a CSV file to bulk add transactions.<br/><br/><span className="font-medium text-gray-700 dark:text-gray-300">Expected format (with header):</span><br/><code className="bg-gray-100 dark:bg-gray-800 p-2 rounded block mt-2 text-xs overflow-x-auto whitespace-nowrap text-gray-800 dark:text-gray-200">Account,AccountType,Type,Category,Subcategory,Amount,Description,Date,IsInvestment</code></p>
                              <div className="flex items-center justify-center w-full">
                                  <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-gray-300 dark:border-gray-700 border-dashed rounded-lg cursor-pointer bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 hover:border-blue-500 transition-colors">
                                      <div className="flex flex-col items-center justify-center pt-5 pb-6"><p className="mb-2 text-sm text-gray-500 dark:text-gray-400"><span className="font-semibold">Click to upload</span></p><p className="text-xs text-gray-400 dark:text-gray-500">CSV file only</p></div>
                                      <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
                                  </label>
                              </div>
                            </div>
                            <div className="pt-6 border-t border-gray-200 dark:border-gray-800">
                              <h3 className="text-sm font-medium text-red-500 dark:text-red-400 uppercase tracking-wider mb-2">Danger Zone</h3>
                              <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">Permanently delete all accounts, transactions, and budgets. This action cannot be undone.</p>
                              <button onClick={handleClearData} className="w-full bg-red-50 dark:bg-red-500/10 hover:bg-red-100 dark:hover:bg-red-500/20 text-red-600 dark:text-red-500 border border-red-200 dark:border-red-500/50 py-2.5 rounded-lg font-medium transition-colors">Clear All Data</button>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}

                {/* Confirm Dialog */}
                {confirmDialog && (
                  <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 dark:bg-black/70 backdrop-blur-sm">
                     <div className="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl w-full max-w-sm p-6 shadow-2xl">
                       <div className="flex items-center gap-3 text-red-500 dark:text-red-400 mb-4">
                         <i className="ph ph-warning-circle text-[24px]"></i>
                         <h3 className="text-lg font-semibold text-gray-900 dark:text-white">{confirmDialog.title}</h3>
                       </div>
                       <p className="text-sm text-gray-600 dark:text-gray-400 mb-6">{confirmDialog.message}</p>
                       <div className="flex gap-3">
                         <button onClick={() => setConfirmDialog(null)} className="flex-1 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-900 dark:text-white py-2.5 rounded-lg font-medium transition-colors">Cancel</button>
                         <button onClick={confirmDialog.onConfirm} className="flex-1 bg-red-600 hover:bg-red-700 text-white py-2.5 rounded-lg font-medium transition-colors">Confirm</button>
                       </div>
                     </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
