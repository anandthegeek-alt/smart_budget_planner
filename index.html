</head>
<body class="bg-gray-50 dark:bg-gray-950 transition-colors duration-200">

    <div id="root">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; color: #9ca3af; font-family: sans-serif; text-align: center; padding: 20px;">
            <div>
                <svg style="animation: spin 1s linear infinite; height: 40px; width: 40px; color: #3b82f6; margin: 0 auto 16px auto;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">

    </div>

    <!-- Main Application Script -->
    <script type="text/babel" data-presets="react,env">
        const { useState, useMemo, useEffect } = React;

        // ==========================================
        // 🚨 SUPABASE CONFIGURATION 🚨
        // ==========================================
        const SUPABASE_URL = 'https://gbiwzdttszkwgnsqgsxy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdiaXd6ZHR0c3prd2duc3Fnc3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjY1ODcsImV4cCI6MjA5MTMwMjU4N30.YuwtOV41HdFPU7iNm1kCWk49j80HBV2K6Ber0MnNKxI';
        
        const isSupabaseConfigured = SUPABASE_URL && SUPABASE_URL.startsWith('http');
        const supabaseClient = isSupabaseConfigured ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        // --- Helpers ---
        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substring(2);
        
        // Generates a local user ID to keep your data partitioned securely
        const getDeviceId = () => {
            let id = window.localStorage.getItem('budget_device_id');
            if (!id) {
                id = 'device_' + generateId();
                window.localStorage.setItem('budget_device_id', id);
            }
            return id;
        };
        const DEVICE_ID = getDeviceId();

        // --- Preset Data ---
        const ACCOUNT_TYPES = [
          { name: 'Liquid', color: '#3b82f6' }, { name: 'Equity', color: '#8b5cf6' },      
          { name: 'Debt', color: '#f97316' }, { name: 'Retirement', color: '#22c55e' }   
        ];

        const ICONS_LIST = [
          'ph-tag', 'ph-house', 'ph-shopping-cart', 'ph-lightning', 'ph-film-strip', 'ph-monitor-play', 'ph-car', 'ph-dots-three-circle', 
          'ph-money', 'ph-laptop', 'ph-trend-up', 'ph-fork-knife', 'ph-airplane-tilt', 'ph-heartbeat', 'ph-book-open', 'ph-game-controller', 
          'ph-shopping-bag', 'ph-chart-bar', 'ph-coffee', 'ph-first-aid', 'ph-graduation-cap', 'ph-paw-print', 'ph-baby', 'ph-barbell',
          'ph-bus', 'ph-train', 'ph-bicycle', 'ph-wrench', 'ph-wifi-high', 'ph-drop', 'ph-fire', 'ph-music-notes', 'ph-camera'
        ];

        const normalizeSubcats = (subs) => (subs || []).map(s => typeof s === 'string' ? { name: s, icon: 'ph-tag' } : s);

        const EXPENSE_CATEGORIES = [
          { name: 'Rent', color: '#ef4444', icon: 'ph-house', subcategories: [] },         
          { name: 'Groceries', color: '#f97316', icon: 'ph-shopping-cart', subcategories: [{name: 'Food', icon: 'ph-fork-knife'}, {name: 'Household Supplies', icon: 'ph-shopping-bag'}] },    
          { name: 'Utilities', color: '#eab308', icon: 'ph-lightning', subcategories: [{name: 'Electricity', icon: 'ph-lightning'}, {name: 'Water', icon: 'ph-drop'}, {name: 'Internet', icon: 'ph-wifi-high'}] },    
          { name: 'Entertainment', color: '#8b5cf6', icon: 'ph-film-strip', subcategories: [] },
          { name: 'Subscriptions', color: '#ec4899', icon: 'ph-monitor-play', subcategories: [] },
          { name: 'Transportation', color: '#3b82f6', icon: 'ph-car', subcategories: [{name: 'Fuel', icon: 'ph-fire'}, {name: 'Public Transit', icon: 'ph-bus'}] },
          { name: 'Other', color: '#6b7280', icon: 'ph-dots-three-circle', subcategories: [] }         
        ];

        const INCOME_CATEGORIES = [
          { name: 'Salary', color: '#22c55e', icon: 'ph-money', subcategories: [] },
          { name: 'Freelance', color: '#10b981', icon: 'ph-laptop', subcategories: [] },
          { name: 'Investments', color: '#14b8a6', icon: 'ph-trend-up', subcategories: [] },
          { name: 'Other', color: '#6b7280', icon: 'ph-dots-three-circle', subcategories: [] }
        ];

        const CURRENCIES = [
          { code: 'USD', name: 'US Dollar ($)' }, { code: 'EUR', name: 'Euro (€)' },
          { code: 'GBP', name: 'British Pound (£)' }, { code: 'INR', name: 'Indian Rupee (₹)' },
          { code: 'JPY', name: 'Japanese Yen (¥)' }, { code: 'CAD', name: 'Canadian Dollar (C$)' },
          { code: 'AUD', name: 'Australian Dollar (A$)' }
        ];

        const INITIAL_TRANSACTIONS = [
          { id: '1', accountId: 'default', type: 'income', category: 'Salary', subcategory: '', amount: 50000, description: 'Monthly Salary', date: new Date().toISOString().split('T')[0], isInvestment: false },
          { id: '2', accountId: 'default', type: 'expense', category: 'Rent', subcategory: '', amount: 15000, description: 'Monthly Rent', date: new Date().toISOString().split('T')[0], isInvestment: false },
          { id: '3', accountId: 'default', type: 'expense', category: 'Groceries', subcategory: 'Food', amount: 8450, description: 'Supermarket', date: new Date().toISOString().split('T')[0], isInvestment: false },
          { id: '4', accountId: 'default', type: 'expense', category: 'Utilities', subcategory: 'Electricity', amount: 2200, description: 'Electric Bill', date: new Date().toISOString().split('T')[0], isInvestment: false },
          { id: '5', accountId: 'default', type: 'expense', category: 'Transportation', subcategory: 'Fuel', amount: 3120, description: 'Gas', date: new Date().toISOString().split('T')[0], isInvestment: false },
          { id: '6', accountId: 'default', type: 'expense', category: 'Entertainment', subcategory: '', amount: 1500, description: 'Movies', date: new Date().toISOString().split('T')[0], isInvestment: false },
        ];

        // --- Bulletproof Supabase Sync Hook ---
        function useSupabaseSyncedState(key, initialValue) {
          const [state, setState] = useState(initialValue);
          const [isLoaded, setIsLoaded] = useState(false);

          // 1. Initial Load & Error Recovery
          useEffect(() => {
            const loadData = async () => {
                if (!supabaseClient) {
                    const local = window.localStorage.getItem(key);
                    if (local) setState(JSON.parse(local));
                    setIsLoaded(true);
                    return;
                }

                try {
                    const { data, error } = await supabaseClient
                        .from('app_data')
                        .select('value')
                        .eq('user_id', DEVICE_ID)
                        .eq('key', key)
                        .single();

                    if (error) {
                        console.warn(`Supabase read error for ${key} (Expected if table is empty):`, error.message);
                        const local = window.localStorage.getItem(key);
                        if (local) setState(JSON.parse(local));
                    } else if (data && data.value) {
                        setState(data.value);
                        window.localStorage.setItem(key, JSON.stringify(data.value));
                    }
                } catch (e) {
                    console.warn(`Unexpected network error loading ${key}, falling back to local storage:`, e);
                    const local = window.localStorage.getItem(key);
                    if (local) setState(JSON.parse(local));
                }
                setIsLoaded(true);
            };
            loadData();
          }, [key]);

          // 2. Realtime Subscription
          useEffect(() => {
              if (!supabaseClient || !isLoaded) return;

              const channelName = `public:app_data:user_id=eq.${DEVICE_ID}:${key}`;
              const channel = supabaseClient
                .channel(channelName)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'app_data', filter: `user_id=eq.${DEVICE_ID}` }, 
                (payload) => {
                    if (payload.new && payload.new.key === key) {
                        setState(payload.new.value);
                        window.localStorage.setItem(key, JSON.stringify(payload.new.value));
                    }
                }).subscribe();

              return () => { supabaseClient.removeChannel(channel); }
          }, [key, isLoaded]);

          // 3. Write Data Safely
          const setSyncedState = (newValueOrUpdater) => {
            setState(prev => {
              const newValue = typeof newValueOrUpdater === 'function' ? newValueOrUpdater(prev) : newValueOrUpdater;
              
              // Always save locally instantly so the UI never lags
              window.localStorage.setItem(key, JSON.stringify(newValue));
              
              if (supabaseClient) {
                  // Safe upsert logic that prevents crashes even if the DB is misconfigured
                  supabaseClient.from('app_data')
                    .select('id')
                    .eq('user_id', DEVICE_ID)
                    .eq('key', key)
                    .single()
                    .then(({data, error}) => {
                        if (data && data.id) {
                            supabaseClient.from('app_data').update({ value: newValue }).eq('id', data.id).then();
                        } else {
                            supabaseClient.from('app_data').insert({ user_id: DEVICE_ID, key: key, value: newValue }).then();
                        }
                    });
              }
              return newValue;
            });
          };

          return [state, setSyncedState, isLoaded];
        }

        // --- Helper Components ---
        const Card = ({ children, className = '' }) => (
          <div className={`bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-lg overflow-hidden transition-colors duration-200 ${className}`}>
            {children}
          </div>
        );

        // --- Main Dashboard ---
        function App() {
          const currentDate = new Date();
          
          const [theme, setTheme, themeLoaded] = useSupabaseSyncedState('budget_theme', 'dark');

          useEffect(() => {
            if (themeLoaded) {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }
          }, [theme, themeLoaded]);

          const [transactions, setTransactions, txLoaded] = useSupabaseSyncedState('budget_transactions', INITIAL_TRANSACTIONS);
          const [accounts, setAccounts, accLoaded] = useSupabaseSyncedState('budget_accounts', [
            { id: 'default', name: 'Main Account', type: 'Liquid', openingBalance: 0 },
            { id: 'savings', name: 'Stock Portfolio', type: 'Equity', openingBalance: 0 }
          ]);
          const [currentAccountId, setCurrentAccountId, curAccLoaded] = useSupabaseSyncedState('budget_current_account', 'all');
          const [currency, setCurrency, curLoaded] = useSupabaseSyncedState('budget_currency', 'INR');
          const [expenseCategories, setExpenseCategories, expCatLoaded] = useSupabaseSyncedState('budget_expense_cats', EXPENSE_CATEGORIES);
          const [incomeCategories, setIncomeCategories, incCatLoaded] = useSupabaseSyncedState('budget_income_cats', INCOME_CATEGORIES);
          const [categoryBudgets, setCategoryBudgets, budgLoaded] = useSupabaseSyncedState('budget_category_budgets', {});
          
          const allLoaded = themeLoaded && txLoaded && accLoaded && curAccLoaded && curLoaded && expCatLoaded && incCatLoaded && budgLoaded;

          const [isSettingsOpen, setIsSettingsOpen] = useState(false);
          const [settingsTab, setSettingsTab] = useState('accounts');

          const [filterMonth, setFilterMonth] = useState((currentDate.getMonth() + 1).toString());
          const [filterYear, setFilterYear] = useState(currentDate.getFullYear().toString());

          const [listFilterCategory, setListFilterCategory] = useState('all');
          const [listFilterSubcategory, setListFilterSubcategory] = useState('all');
          const [listFilterDateFrom, setListFilterDateFrom] = useState('');
          const [listFilterDateTo, setListFilterDateTo] = useState('');

          const [selectedParentCategory, setSelectedParentCategory] = useState(null);
          const [hoveredPoint, setHoveredPoint] = useState(null);

          const [formData, setFormData] = useState({
            type: 'expense', category: 'Groceries', subcategory: '', amount: '', description: '',
            date: new Date().toISOString().split('T')[0], accountId: '', fromAccountId: '', toAccountId: '', isInvestment: false
          });

          const [editingAccount, setEditingAccount] = useState(null);
          const [editingTransactionId, setEditingTransactionId] = useState(null);
          const [editingCategory, setEditingCategory] = useState(null);
          const [editingSubcategory, setEditingSubcategory] = useState(null);
          
          const [newAccountName, setNewAccountName] = useState('');
          const [newAccountType, setNewAccountType] = useState('Liquid');
          const [newAccountBalance, setNewAccountBalance] = useState('');

          const [newCatName, setNewCatName] = useState('');
          const [newCatColor, setNewCatColor] = useState('#8b5cf6');
          const [newCatIcon, setNewCatIcon] = useState('ph-tag');
          const [newCatType, setNewCatType] = useState('expense');

          const [showAllTransactions, setShowAllTransactions] = useState(false);
          const [isEditingBudgets, setIsEditingBudgets] = useState(false);

          const [statusMessage, setStatusMessage] = useState(null);
          const [confirmDialog, setConfirmDialog] = useState(null);

          // Formatters
          const currencySymbol = useMemo(() => {
            if (!allLoaded) return '₹';
            const parts = new Intl.NumberFormat('en-IN', { style: 'currency', currency: currency }).formatToParts(0);
            return parts.find(p => p.type === 'currency')?.value || '₹';
          }, [currency, allLoaded]);

          const formatCurrency = (amount) => {
            return new Intl.NumberFormat('en-IN', { style: 'currency', currency: currency, maximumFractionDigits: 2 }).format(amount);
          };

          // Logic & Data Derivation
          const availableYears = useMemo(() => {
            if (!allLoaded) return [currentDate.getFullYear()];
            const years = new Set(transactions.map(t => {
                if (!t.date) return currentDate.getFullYear();
                return parseInt(t.date.split('-')[0], 10);
            }));
            years.add(currentDate.getFullYear());
            return Array.from(years).filter(y => !isNaN(y)).sort((a, b) => b - a);
          }, [transactions, allLoaded]);

          const activeTransactions = useMemo(() => {
            if (!allLoaded) return [];
            return transactions.filter(t => {
              const isAccountMatch = currentAccountId === 'all' || 
                                     (t.type !== 'transfer' && t.accountId === currentAccountId) ||
                                     (t.type === 'transfer' && (t.fromAccountId === currentAccountId || t.toAccountId === currentAccountId));
              if (!isAccountMatch) return false;

              if (filterYear === 'all') return true;
              if (!t.date) return false;
              const [y, m] = t.date.split('-');
              if (parseInt(y, 10) !== Number(filterYear)) return false;
              if (filterMonth !== 'all' && parseInt(m, 10) !== Number(filterMonth)) return false;
              return true;
            }).sort((a, b) => new Date(b.date) - new Date(a.date));
          }, [transactions, currentAccountId, filterMonth, filterYear, allLoaded]);

          const dateFilteredTransactions = useMemo(() => {
            return activeTransactions.filter(t => {
                if (listFilterDateFrom && t.date < listFilterDateFrom) return false;
                if (listFilterDateTo && t.date > listFilterDateTo) return false;
                return true;
            });
          }, [activeTransactions, listFilterDateFrom, listFilterDateTo]);

          const displayedTransactions = useMemo(() => {
             return dateFilteredTransactions.filter(t => {
                if (listFilterCategory !== 'all') {
                    if (listFilterCategory === 'Transfer') {
                        if (t.type !== 'transfer') return false;
                    } else {
                        if (t.category !== listFilterCategory) return false;
                    }
                }
                if (listFilterSubcategory !== 'all' && t.subcategory !== listFilterSubcategory) return false;
                return true;
             });
          }, [dateFilteredTransactions, listFilterCategory, listFilterSubcategory]);

          const availableSubcategoriesFilters = useMemo(() => {
              if (listFilterCategory === 'all' || listFilterCategory === 'Transfer' || !allLoaded) return [];
              const catObj = [...expenseCategories, ...incomeCategories].find(c => c.name === listFilterCategory);
              return normalizeSubcats(catObj?.subcategories).map(s => s.name);
          }, [listFilterCategory, expenseCategories, incomeCategories, allLoaded]);

          const overallAccountBalance = useMemo(() => {
            if (!allLoaded) return 0;
            if (currentAccountId === 'all') {
              let bal = accounts.reduce((sum, acc) => sum + (Number(acc.openingBalance) || 0), 0);
              transactions.forEach(t => {
                 const amount = parseFloat(t.amount);
                 if (t.type === 'income') bal += amount;
                 else if (t.type === 'expense') bal -= amount;
              });
              return bal;
            }
            const acc = accounts.find(a => a.id === currentAccountId);
            let bal = acc ? (Number(acc.openingBalance) || 0) : 0;
            transactions.forEach(t => {
               const amount = parseFloat(t.amount);
               if (t.type === 'income' && t.accountId === currentAccountId) bal += amount;
               else if (t.type === 'expense' && t.accountId === currentAccountId) bal -= amount;
               else if (t.type === 'transfer') {
                  if (t.fromAccountId === currentAccountId) bal -= amount;
                  if (t.toAccountId === currentAccountId) bal += amount;
               }
            });
            return bal;
          }, [transactions, currentAccountId, accounts, allLoaded]);

          const { totalIncome, totalExpenses, balance, savingsRate, rawExpensesByCategory, hierarchicalExpenses } = useMemo(() => {
            let income = 0;
            let expenses = 0;
            let transferNet = 0;
            
            const expByParentCategory = {};
            const hierarchy = {};

            dateFilteredTransactions.forEach(t => {
              const amount = parseFloat(t.amount);
              if (t.type === 'income') {
                if (currentAccountId === 'all' || t.accountId === currentAccountId) {
                  income += amount;
                }
              } else if (t.type === 'expense') {
                if (currentAccountId === 'all' || t.accountId === currentAccountId) {
                  expenses += amount;
                  
                  expByParentCategory[t.category] = (expByParentCategory[t.category] || 0) + amount;
                  
                  if (!hierarchy[t.category]) {
                      hierarchy[t.category] = {
                          total: 0,
                          color: expenseCategories.find(c => c.name === t.category)?.color || '#6b7280',
                          subs: {}
                      };
                  }
                  hierarchy[t.category].total += amount;
                  const subKey = t.subcategory || 'Uncategorized';
                  hierarchy[t.category].subs[subKey] = (hierarchy[t.category].subs[subKey] || 0) + amount;
                }
              } else if (t.type === 'transfer') {
                if (currentAccountId !== 'all') {
                  if (t.fromAccountId === currentAccountId) transferNet -= amount;
                  if (t.toAccountId === currentAccountId) transferNet += amount;
                }
              }
            });

            const currentBalanceFlow = income - expenses + transferNet;
            
            const isAllTime = filterMonth === 'all' && filterYear === 'all' && !listFilterDateFrom && !listFilterDateTo;
            let openingBal = 0;
            if (currentAccountId === 'all') {
               openingBal = accounts.reduce((sum, acc) => sum + (Number(acc.openingBalance) || 0), 0);
            } else {
               const acc = accounts.find(a => a.id === currentAccountId);
               openingBal = acc ? (Number(acc.openingBalance) || 0) : 0;
            }
            const finalBalance = currentBalanceFlow + (isAllTime ? Number(openingBal) : 0);

            const rate = income > 0 ? (((income - expenses) / income) * 100).toFixed(1) : 0;

            return {
              totalIncome: income,
              totalExpenses: expenses,
              balance: finalBalance,
              savingsRate: rate,
              rawExpensesByCategory: expByParentCategory,
              hierarchicalExpenses: hierarchy
            };
          }, [dateFilteredTransactions, expenseCategories, currentAccountId, filterMonth, filterYear, listFilterDateFrom, listFilterDateTo, accounts]);

          const { currentLevelData, currentLevelTotal } = useMemo(() => {
            if (selectedParentCategory && hierarchicalExpenses[selectedParentCategory]) {
                const parent = hierarchicalExpenses[selectedParentCategory];
                const catObj = [...expenseCategories, ...incomeCategories].find(c => c.name === selectedParentCategory);
                const subcats = normalizeSubcats(catObj?.subcategories);
                const data = Object.entries(parent.subs).map(([sub, val]) => {
                    const sObj = subcats.find(s => s.name === sub);
                    return {
                        name: sub,
                        value: val,
                        color: parent.color,
                        icon: sObj?.icon || 'ph-tag',
                        onClick: () => {
                            setListFilterSubcategory(sub === 'Uncategorized' ? 'all' : sub);
                        }
                    };
                }).sort((a, b) => b.value - a.value);
                return { currentLevelData: data, currentLevelTotal: parent.total };
            } else {
                const data = Object.entries(hierarchicalExpenses).map(([name, data]) => {
                    const catObj = [...expenseCategories, ...incomeCategories].find(c => c.name === name);
                    const hasSubs = Object.keys(data.subs).length > 1 || (Object.keys(data.subs).length === 1 && Object.keys(data.subs)[0] !== 'Uncategorized');
                    return {
                        name,
                        value: data.total,
                        color: data.color,
                        icon: catObj?.icon || 'ph-tag',
                        hasSubs,
                        onClick: () => {
                            if (hasSubs) {
                                setSelectedParentCategory(name);
                                setListFilterCategory(name);
                                setListFilterSubcategory('all');
                            } else {
                                setListFilterCategory(name);
                                setListFilterSubcategory('all');
                            }
                        }
                    };
                }).sort((a, b) => b.value - a.value);
                return { currentLevelData: data, currentLevelTotal: totalExpenses };
            }
          }, [hierarchicalExpenses, selectedParentCategory, totalExpenses, expenseCategories, incomeCategories]);

          useEffect(() => {
            if (selectedParentCategory && !hierarchicalExpenses[selectedParentCategory]) {
                setSelectedParentCategory(null);
            }
          }, [hierarchicalExpenses, selectedParentCategory]);

          const { investmentsByTag, totalInvestments } = useMemo(() => {
            let total = 0;
            const byTag = {};

            dateFilteredTransactions.forEach(t => {
              if (t.isInvestment) {
                if (t.type === 'income' && (currentAccountId === 'all' || t.accountId === currentAccountId)) {
                  const amount = parseFloat(t.amount);
                  total += amount;
                  const color = incomeCategories.find(c => c.name === t.category)?.color || '#22c55e';
                  const key = t.subcategory ? `${t.category} - ${t.subcategory}` : t.category;
                  byTag[key] = { value: (byTag[key]?.value || 0) + amount, color };
                } 
                else if (t.type === 'transfer' && (currentAccountId === 'all' || t.fromAccountId === currentAccountId)) {
                  const amount = parseFloat(t.amount);
                  total += amount;
                  const toAcc = accounts.find(a => a.id === t.toAccountId);
                  const label = toAcc ? toAcc.name : 'Unknown Account';
                  const color = toAcc ? (ACCOUNT_TYPES.find(at => at.name === toAcc.type)?.color || '#8b5cf6') : '#8b5cf6';
                  byTag[label] = { value: (byTag[label]?.value || 0) + amount, color };
                }
              }
            });

            const chartData = Object.entries(byTag)
              .map(([name, data]) => ({ name, value: data.value, color: data.color }))
              .sort((a, b) => b.value - a.value);

            return { investmentsByTag: chartData, totalInvestments: total };
          }, [dateFilteredTransactions, currentAccountId, accounts, incomeCategories]);

          const spendingTrendData = useMemo(() => {
            const expenses = dateFilteredTransactions.filter(t => t.type === 'expense');
            let data = [];
            
            if (filterMonth !== 'all' && filterYear !== 'all') {
                // Group by Day
                const daysInMonth = new Date(filterYear, filterMonth, 0).getDate();
                data = Array.from({length: daysInMonth}, (_, i) => ({ label: (i+1).toString(), value: 0 }));
                expenses.forEach(t => {
                    const day = parseInt(t.date.split('-')[2], 10);
                    if (day && data[day - 1]) data[day - 1].value += parseFloat(t.amount);
                });
            } else if (filterYear !== 'all') {
                // Group by Month
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                data = months.map(m => ({ label: m, value: 0 }));
                expenses.forEach(t => {
                    const month = parseInt(t.date.split('-')[1], 10);
                    if (month && data[month - 1]) data[month - 1].value += parseFloat(t.amount);
                });
            } else {
                // Group by Year
                const yearsMap = {};
                expenses.forEach(t => {
                    const year = t.date.split('-')[0];
                    if (year) {
                        yearsMap[year] = (yearsMap[year] || 0) + parseFloat(t.amount);
                    }
                });
                const years = Object.keys(yearsMap).sort();
                if (years.length === 0) years.push(new Date().getFullYear().toString());
                data = years.map(y => ({ label: y, value: yearsMap[y] || 0 }));
            }
            return data;
          }, [dateFilteredTransactions, filterMonth, filterYear]);

          const isOverBudget = balance < 0;

          const activeCategoryObj = useMemo(() => {
            if (formData.type === 'expense') return expenseCategories.find(c => c.name === formData.category);
            if (formData.type === 'income') return incomeCategories.find(c => c.name === formData.category);
            return null;
          }, [formData.type, formData.category, expenseCategories, incomeCategories]);

          const activeSubcategories = normalizeSubcats(activeCategoryObj?.subcategories);

          const effectiveAccountId = currentAccountId === 'all' ? (formData.accountId || accounts[0]?.id) : currentAccountId;
          const effectiveFromAccountId = currentAccountId === 'all' ? (formData.fromAccountId || accounts[0]?.id) : currentAccountId;

          // --- User Interactions ---
          const handleInputChange = (e) => {
            const { name, value, type, checked } = e.target;
            const val = type === 'checkbox' ? checked : value;
            
            if (name === 'type') {
              let updates = { [name]: val, subcategory: '', isInvestment: false };
              if (val === 'income') updates.category = incomeCategories[0]?.name || 'Salary';
              else if (val === 'expense') updates.category = expenseCategories[0]?.name || 'Groceries';
              else if (val === 'transfer') {
                 const effFrom = currentAccountId === 'all' ? (formData.fromAccountId || accounts[0]?.id) : currentAccountId;
                 const otherAccount = accounts.find(a => a.id !== effFrom);
                 updates.toAccountId = otherAccount ? otherAccount.id : '';
              }
              setFormData(prev => ({ ...prev, ...updates }));
            } else if (name === 'category') {
              setFormData(prev => ({ ...prev, category: val, subcategory: '' }));
            } else if (name === 'fromAccountId') {
              let updates = { fromAccountId: val };
              if (val === formData.toAccountId) {
                 updates.toAccountId = accounts.find(a => a.id !== val)?.id || '';
              }
              setFormData(prev => ({ ...prev, ...updates }));
            } else {
              setFormData(prev => ({ ...prev, [name]: val }));
            }
          };

          const handleAddTransaction = (e) => {
            e.preventDefault();
            
            // MATH EVALUATION LOGIC
            let finalAmount = formData.amount.toString().trim();
            if (finalAmount.startsWith('=')) {
                try {
                    // Strips out any dangerous text, allowing only math characters
                    const mathExpr = finalAmount.substring(1).replace(/[^0-9+\-*/.()]/g, '');
                    if (!mathExpr) throw new Error("Empty Expression");
                    finalAmount = new Function('return ' + mathExpr)();
                } catch (err) {
                    setStatusMessage({ type: 'error', text: 'Invalid math expression in Amount field.' });
                    setTimeout(() => setStatusMessage(null), 3000);
                    return;
                }
            }

            const parsedAmount = parseFloat(finalAmount);
            if (isNaN(parsedAmount) || parsedAmount <= 0) {
                setStatusMessage({ type: 'error', text: 'Please enter a valid amount greater than 0.' });
                setTimeout(() => setStatusMessage(null), 3000);
                return;
            }

            if (formData.type === 'transfer' && (!formData.toAccountId || formData.toAccountId === effectiveFromAccountId)) return;

            const transactionData = {
              ...formData,
              accountId: formData.type === 'transfer' ? undefined : effectiveAccountId,
              fromAccountId: formData.type === 'transfer' ? effectiveFromAccountId : undefined,
              amount: parsedAmount
            };

            if (editingTransactionId) {
              setTransactions(prev => prev.map(t => 
                t.id === editingTransactionId ? { ...transactionData, id: editingTransactionId } : t
              ));
              setEditingTransactionId(null);
            } else {
              const newTransaction = {
                ...transactionData,
                id: generateId(),
              };
              setTransactions(prev => [newTransaction, ...prev]);
            }
            
            setFormData(prev => ({ ...prev, amount: '', description: '', subcategory: '', isInvestment: false })); 
          };

          const handleEditTransaction = (transaction) => {
            setEditingTransactionId(transaction.id);
            setFormData({
              type: transaction.type,
              category: transaction.category || '',
              subcategory: transaction.subcategory || '',
              amount: transaction.amount.toString(),
              description: transaction.description || '',
              date: transaction.date || new Date().toISOString().split('T')[0],
              accountId: transaction.accountId || '',
              fromAccountId: transaction.fromAccountId || '',
              toAccountId: transaction.toAccountId || '',
              isInvestment: transaction.isInvestment || false
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const handleCancelEdit = () => {
            setEditingTransactionId(null);
            setFormData({
              type: 'expense',
              category: expenseCategories[0]?.name || 'Groceries',
              subcategory: '',
              amount: '',
              description: '',
              date: new Date().toISOString().split('T')[0],
              accountId: '',
              fromAccountId: '',
              toAccountId: '',
              isInvestment: false
            });
          };

          const handleDelete = (id) => {
            setTransactions(prev => prev.filter(t => t.id !== id));
            if (editingTransactionId === id) handleCancelEdit();
          };

          const clearListFilters = () => {
             setListFilterCategory('all');
             setListFilterSubcategory('all');
             setListFilterDateFrom('');
             setListFilterDateTo('');
             setSelectedParentCategory(null);
          };

          // Settings functions (Categories, Accounts, Export, etc.)
          const handleAddSubcategory = (e, catName, type) => {
            e.preventDefault();
            const inputName = e.target.elements.subcatName.value.trim();
            const inputIcon = e.target.elements.subcatIcon.value;
            if (!inputName) return;
            
            const updateFn = type === 'expense' ? setExpenseCategories : setIncomeCategories;
            updateFn(prev => prev.map(c => {
              if (c.name === catName) {
                const subs = normalizeSubcats(c.subcategories);
                if (!subs.find(s => s.name === inputName)) return { ...c, subcategories: [...subs, { name: inputName, icon: inputIcon }] };
              }
              return c;
            }));
            e.target.reset(); 
          };

          const handleRemoveSubcategory = (catName, type, subName) => {
            const updateFn = type === 'expense' ? setExpenseCategories : setIncomeCategories;
            updateFn(prev => prev.map(c => {
              if (c.name === catName) {
                return { ...c, subcategories: normalizeSubcats(c.subcategories).filter(s => s.name !== subName) };
              }
              return c;
            }));
          };

          const handleUpdateCategory = (e) => {
            e.preventDefault();
            if (!editingCategory || !editingCategory.name) return;
            const updateFn = editingCategory.type === 'expense' ? setExpenseCategories : setIncomeCategories;
            
            updateFn(prev => prev.map(c => {
                if (c.name === editingCategory.originalName) {
                    return { ...c, name: editingCategory.name, color: editingCategory.color, icon: editingCategory.icon };
                }
                return c;
            }));

            if (editingCategory.originalName !== editingCategory.name) {
                setTransactions(prev => prev.map(t => 
                    t.category === editingCategory.originalName ? { ...t, category: editingCategory.name } : t
                ));
                setCategoryBudgets(prev => {
                    const newB = {...prev};
                    if (newB[editingCategory.originalName]) {
                        newB[editingCategory.name] = newB[editingCategory.originalName];
                        delete newB[editingCategory.originalName];
                    }
                    return newB;
                });
            }
            setEditingCategory(null);
          };

          const handleUpdateSubcategory = (e) => {
            e.preventDefault();
            if (!editingSubcategory || !editingSubcategory.name) return;
            const updateFn = editingSubcategory.type === 'expense' ? setExpenseCategories : setIncomeCategories;
            
            updateFn(prev => prev.map(c => {
                if (c.name === editingSubcategory.categoryName) {
                    const subs = normalizeSubcats(c.subcategories).map(s => 
                        s.name === editingSubcategory.originalName ? { name: editingSubcategory.name, icon: editingSubcategory.icon } : s
                    );
                    return { ...c, subcategories: subs };
                }
                return c;
            }));

            if (editingSubcategory.originalName !== editingSubcategory.name) {
                setTransactions(prev => prev.map(t => 
                    (t.category === editingSubcategory.categoryName && t.subcategory === editingSubcategory.originalName) 
                        ? { ...t, subcategory: editingSubcategory.name } 
                        : t
                ));
            }
            setEditingSubcategory(null);
          };

          const handleAddCategory = (e) => {
            e.preventDefault();
            if (!newCatName) return;
            const newCat = { name: newCatName, color: newCatColor, icon: newCatIcon, subcategories: [] };
            if (newCatType === 'expense') {
              setExpenseCategories(prev => [...prev, newCat]);
            } else {
              setIncomeCategories(prev => [...prev, newCat]);
            }
            setNewCatName('');
          };

          const handleDeleteCategory = (name, type) => {
            if (type === 'expense') setExpenseCategories(prev => prev.filter(c => c.name !== name));
            else setIncomeCategories(prev => prev.filter(c => c.name !== name));
          };

          const handleAddAccount = (e) => {
            e.preventDefault();
            if (!newAccountName) return;
            const newAcc = { 
              id: generateId(), 
              name: newAccountName, 
              type: newAccountType,
              openingBalance: parseFloat(newAccountBalance) || 0 
            };
            setAccounts(prev => [...prev, newAcc]);
            setCurrentAccountId(newAcc.id);
            setNewAccountName('');
            setNewAccountBalance('');
            setNewAccountType('Liquid');
          };

          const handleUpdateAccount = (e) => {
            e.preventDefault();
            if (!editingAccount || !editingAccount.name) return;
            setAccounts(prev => prev.map(a => 
              a.id === editingAccount.id ? { 
                ...a, name: editingAccount.name, type: editingAccount.type, openingBalance: parseFloat(editingAccount.openingBalance) || 0 
              } : a
            ));
            setEditingAccount(null);
          };

          const handleDeleteAccount = (id) => {
            if (accounts.length <= 1) return;
            setAccounts(prev => prev.filter(a => a.id !== id));
            setTransactions(prev => prev.filter(t => t.accountId !== id && t.fromAccountId !== id && t.toAccountId !== id));
            if (currentAccountId === id) setCurrentAccountId('all');
          };

          const handleClearData = () => {
            setConfirmDialog({
              title: 'Clear All Data',
              message: 'Are you sure you want to delete all accounts, transactions, and budgets? This action cannot be undone.',
              onConfirm: () => {
                setTransactions([]);
                setAccounts([{ id: 'default', name: 'Main Account', type: 'Liquid', openingBalance: 0 }]);
                setCurrentAccountId('all');
                setCategoryBudgets({});
                setExpenseCategories(EXPENSE_CATEGORIES);
                setIncomeCategories(INCOME_CATEGORIES);
                setCurrency('INR');
                setConfirmDialog(null);
                setStatusMessage({ type: 'success', text: 'All data has been successfully cleared.' });
                setTimeout(() => setStatusMessage(null), 3000);
              }
            });
          };

          const handleExportData = () => {
            if (transactions.length === 0) {
              setStatusMessage({ type: 'error', text: 'No transactions available to export.' });
              setTimeout(() => setStatusMessage(null), 3000);
              return;
            }
            const headers = ['Account', 'AccountType', 'Type', 'Category', 'Subcategory', 'Amount', 'Description', 'Date', 'IsInvestment'];
            const csvRows = [headers.join(',')];

            transactions.forEach(t => {
              const acc = accounts.find(a => a.id === t.accountId);
              let accName = acc ? acc.name : 'Unknown Account';
              let accType = acc ? (acc.type || 'Liquid') : 'Unknown';
              
              if (t.type === 'transfer') {
                  const fromAccObj = accounts.find(a => a.id === t.fromAccountId);
                  const toAccObj = accounts.find(a => a.id === t.toAccountId);
                  accName = `${fromAccObj?.name || 'Unknown'} -> ${toAccObj?.name || 'Unknown'}`;
                  accType = 'Transfer';
              }

              const desc = t.description ? `"${t.description.replace(/"/g, '""')}"` : '';
              const subcat = t.subcategory ? `"${t.subcategory.replace(/"/g, '""')}"` : '';
              
              csvRows.push([`"${accName}"`, `"${accType}"`, t.type, `"${t.category}"`, subcat, t.amount, desc, t.date, t.isInvestment ? 'TRUE' : 'FALSE'].join(','));
            });

            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `budget_transactions_${new Date().toISOString().split('T')[0]}.csv`;
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (currentAccountId === 'all') {
                setStatusMessage({ type: 'error', text: 'Please select a specific account from the top dropdown before importing data.' });
                setTimeout(() => setStatusMessage(null), 4500);
                e.target.value = null;
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
              const lines = event.target.result.split(/\r?\n/);
              if (lines.length < 2) return; 

              const headerRow = lines[0].split(',').map(p => p.trim().replace(/^"|"$/g, '').toLowerCase());
              const idx = {
                type: headerRow.indexOf('type'), cat: headerRow.indexOf('category'),
                subcat: headerRow.indexOf('subcategory'), amt: headerRow.indexOf('amount'),
                desc: headerRow.indexOf('description'), date: headerRow.indexOf('date'),
                inv: headerRow.indexOf('isinvestment')
              };

              const newTxs = [];
              for(let i=1; i<lines.length; i++) {
                if (!lines[i].trim()) continue;
                const parts = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(p => p.trim().replace(/^"|"$/g, ''));
                if (parts.length < 3) continue;
                
                const typeRaw = idx.type >= 0 ? parts[idx.type] : parts[1] || parts[0]; 
                const amountRaw = idx.amt >= 0 ? parts[idx.amt] : parts[4] || parts[3];
                const amount = parseFloat((amountRaw || '').replace(/[^0-9.-]+/g, ''));
                
                if (isNaN(amount)) continue;
                const tType = (typeRaw || '').toLowerCase();
                if(!['income', 'expense', 'transfer'].includes(tType)) continue;

                newTxs.push({
                  id: generateId(),
                  accountId: currentAccountId,
                  type: tType,
                  category: (idx.cat >= 0 ? parts[idx.cat] : parts[2] || parts[1]) || 'Other',
                  subcategory: idx.subcat >= 0 ? parts[idx.subcat] : parts[3] || parts[2] || '',
                  amount: amount,
                  description: (idx.desc >= 0 ? parts[idx.desc] : parts[5] || parts[4]) || '',
                  date: (idx.date >= 0 ? parts[idx.date] : parts[6] || parts[5]) || new Date().toISOString().split('T')[0],
                  isInvestment: (idx.inv >= 0 ? parts[idx.inv] : '').toUpperCase() === 'TRUE'
                });
              }

              if (newTxs.length > 0) {
                setTransactions(prev => [...newTxs, ...prev]);
                setStatusMessage({ type: 'success', text: `Successfully imported ${newTxs.length} transactions!` });
              } else {
                setStatusMessage({ type: 'error', text: 'No valid transactions found in the CSV.' });
              }
              setTimeout(() => setStatusMessage(null), 4500);
              e.target.value = null; 
            };
            reader.readAsText(file);
          };

          const renderDonutChart = (totalValue, dataArray, emptyMessage, iconClass) => {
            if (totalValue === 0) {
              return (
                <div className="flex flex-col items-center justify-center h-48 text-gray-500">
                  <i className={`ph ${iconClass} text-[48px] mb-2 opacity-20`}></i>
                  <p className="text-center text-sm">{emptyMessage}</p>
                </div>
              );
            }
            let currentOffset = 25;
            const radius = 15.915494309189533;
            const emptyRingColor = theme === 'dark' ? '#374151' : '#e5e7eb';
            
            return (
              <div className="relative w-full aspect-square max-w-[240px] mx-auto">
                <svg viewBox="0 0 42 42" className="w-full h-full transform -rotate-90">
                  <circle cx="21" cy="21" r={radius} fill="transparent" stroke={emptyRingColor} strokeWidth="6" />
                  {dataArray.map((segment, idx) => {
                    const percentage = (segment.value / totalValue) * 100;
                    const gap = dataArray.length > 1 ? 0.5 : 0;
                    const dashVal = Math.max(0, percentage - gap);
                    const strokeDasharray = `${dashVal} ${100 - dashVal}`;
                    const offset = currentOffset;
                    currentOffset -= percentage;

                    return (
                      <circle
                        key={segment.name + idx} cx="21" cy="21" r={radius} fill="transparent"
                        stroke={segment.color} strokeWidth="6" strokeDasharray={strokeDasharray} strokeDashoffset={offset}
                        className={`transition-all duration-500 ease-in-out ${segment.onClick ? 'cursor-pointer hover:opacity-80 hover:stroke-[8px]' : ''}`}
                        onClick={segment.onClick}
                      />
                    );
                  })}
                </svg>
                <div className="absolute inset-0 flex flex-col items-center justify-center text-center pointer-events-none">
                  <span className="text-gray-500 dark:text-gray-400 text-sm">Total</span>
                  <span className="text-xl font-bold text-gray-900 dark:text-gray-100">{formatCurrency(totalValue)}</span>
                </div>
              </div>
            );
          };

          const renderTrendChart = () => {
            if (spendingTrendData.length === 0 || spendingTrendData.every(d => d.value === 0)) {
                return (
                    <div className="flex flex-col items-center justify-center h-48 text-gray-500">
                        <i className="ph ph-chart-line text-[48px] mb-2 opacity-20"></i>
                        <p className="text-center text-sm">No spending data to plot</p>
                    </div>
                );
            }

            const maxVal = Math.max(...spendingTrendData.map(d => d.value)) || 1;
            // Add 10% headroom to the top of the chart so the line doesn't clip
            const adjustedMax = maxVal * 1.1; 
            
            const width = 800;
            const height = 240;
            const paddingLeft = 55; // Increased to fit Y-axis labels
            const paddingRight = 30;
            const paddingY = 30;
            const chartW = width - paddingLeft - paddingRight;
            const chartH = height - paddingY * 2;

            // Formatter for Y-axis (Compact format: 1.5L, 50K, etc.)
            const formatY = (val) => new Intl.NumberFormat('en-IN', { notation: "compact", maximumFractionDigits: 1 }).format(val);

            const points = spendingTrendData.map((d, i) => {
                const x = paddingLeft + (i * (chartW / (spendingTrendData.length - 1 || 1)));
                const y = height - paddingY - ((d.value / adjustedMax) * chartH);
                return `${x},${y}`;
            }).join(' ');

            const areaPath = `${paddingLeft},${height - paddingY} ${points} ${width - paddingRight},${height - paddingY}`;

            return (
                <div className="relative w-full overflow-x-auto custom-scrollbar">
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full min-w-[600px] max-h-64 overflow-visible">
                        <defs>
                            <linearGradient id="lineGradient" x1="0" x2="0" y1="0" y2="1">
                                <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.4" />
                                <stop offset="100%" stopColor="#3b82f6" stopOpacity="0" />
                            </linearGradient>
                        </defs>
                        
                        {[0, 0.25, 0.5, 0.75, 1].map(ratio => {
                            const y = height - paddingY - (chartH * ratio);
                            const val = adjustedMax * ratio;
                            return (
                                <g key={ratio}>
                                    <text x={paddingLeft - 10} y={y + 4} fontSize="11" textAnchor="end" className="fill-gray-500 dark:fill-gray-400 font-medium">
                                        {val === 0 ? '0' : formatY(val)}
                                    </text>
                                    <line x1={paddingLeft} y1={y} x2={width - paddingRight} y2={y} stroke="currentColor" className="text-gray-200 dark:text-gray-800" strokeWidth="1" />
                                </g>
                            )
                        })}

                        <polygon points={areaPath} fill="url(#lineGradient)" />
                        <polyline points={points} fill="none" stroke="#3b82f6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                        
                        {spendingTrendData.map((d, i) => {
                            const x = paddingLeft + (i * (chartW / (spendingTrendData.length - 1 || 1)));
                            const y = height - paddingY - ((d.value / adjustedMax) * chartH);
                            return (
                                <g key={i}>
                                    <circle 
                                        cx={x} cy={y} r="5" 
                                        className="fill-white dark:fill-gray-900 stroke-blue-500 stroke-[2px] cursor-pointer transition-all hover:stroke-[4px]" 
                                        onMouseEnter={() => setHoveredPoint({ x, y, value: d.value, label: d.label })} 
                                        onMouseLeave={() => setHoveredPoint(null)} 
                                    />
                                    {(spendingTrendData.length <= 12 || i % Math.ceil(spendingTrendData.length / 10) === 0 || i === spendingTrendData.length - 1) && (
                                        <text x={x} y={height - 5} fontSize="11" textAnchor="middle" className="fill-gray-500 dark:fill-gray-400 font-medium">{d.label}</text>
                                    )}
                                </g>
                            )
                        })}
                        
                        {hoveredPoint && (
                            <g className="pointer-events-none transition-all duration-200 ease-in-out">
                                <rect 
                                    x={Math.max(10, Math.min(width - 100, hoveredPoint.x - 45))} 
                                    y={hoveredPoint.y - 35} 
                                    width="90" 
                                    height="24" 
                                    rx="6" 
                                    className="fill-gray-800 dark:fill-white shadow-xl" 
                                />
                                <text 
                                    x={Math.max(55, Math.min(width - 55, hoveredPoint.x))} 
                                    y={hoveredPoint.y - 18} 
                                    fontSize="12" 
                                    textAnchor="middle" 
                                    className="fill-white dark:fill-gray-900 font-bold"
                                >
                                    {formatCurrency(hoveredPoint.value)}
                                </text>
                            </g>
                        )}
                    </svg>
                </div>
            );
          };

          if (!allLoaded) {
            return (
              <div className="flex justify-center items-center h-screen">
                <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
              </div>
            );
          }

          return (
            <div className="min-h-screen text-gray-900 dark:text-gray-100 font-sans p-4 sm:p-6 lg:p-8 transition-colors duration-200">
              <div className="max-w-7xl mx-auto space-y-6">
                
                {/* Header */}
                <header className="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                  <div>
                    <h1 className="text-2xl sm:text-3xl font-bold flex items-center gap-2 text-gray-900 dark:text-white">
                      <i className="ph ph-wallet text-blue-600 dark:text-blue-500 text-[28px]"></i>
                      Smart Budget
                    </h1>
                    <p className="text-gray-500 dark:text-gray-400 text-sm mt-1">Track your income, expenses, and goals.</p>
                  </div>
                  
                  <div className="flex flex-wrap items-center gap-3 w-full md:w-auto">
                    <div className="flex items-center gap-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-1 shrink-0">
                      <select 
                        value={filterMonth} onChange={(e) => setFilterMonth(e.target.value)}
                        className="bg-transparent text-sm py-1.5 px-1 sm:px-2 text-gray-900 dark:text-white focus:outline-none cursor-pointer"
                      >
                        <option value="all">All Months</option>
                        <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                        <option value="4">Apr</option><option value="5">May</option><option value="6">Jun</option>
                        <option value="7">Jul</option><option value="8">Aug</option><option value="9">Sep</option>
                        <option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
                      </select>
                      <div className="w-px h-4 bg-gray-200 dark:bg-gray-700"></div>
                      <select 
                        value={filterYear} onChange={(e) => setFilterYear(e.target.value)}
                        className="bg-transparent text-sm py-1.5 px-1 sm:px-2 text-gray-900 dark:text-white focus:outline-none cursor-pointer"
                      >
                        <option value="all">All Time</option>
                        {availableYears.map(year => <option key={year} value={year}>{year}</option>)}
                      </select>
                    </div>

                    <div className="relative flex-1 sm:flex-none">
                      <select 
                        value={currentAccountId} onChange={(e) => setCurrentAccountId(e.target.value)}
                        className="w-full sm:w-40 appearance-none bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-900 dark:text-blue-100 py-2 pl-4 pr-10 rounded-lg focus:outline-none focus:ring-1 focus:ring-blue-500 cursor-pointer text-sm font-medium"
                      >
                        <option value="all">All Accounts</option>
                        <optgroup label="Your Accounts">
                           {accounts.map(acc => <option key={acc.id} value={acc.id}>{acc.name}</option>)}
                        </optgroup>
                      </select>
                      <i className="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
                    </div>
                    
                    <div className="flex gap-2">
                        <button onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} className="p-2 bg-white dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-700 rounded-lg transition-colors text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white shrink-0" title="Toggle Theme">
                          {theme === 'dark' ? <i className="ph ph-sun text-[20px]"></i> : <i className="ph ph-moon text-[20px]"></i>}
                        </button>
                        <button onClick={() => setIsSettingsOpen(true)} className="p-2 bg-white dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-700 rounded-lg transition-colors text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white shrink-0" title="Settings">
                          <i className="ph ph-gear text-[20px]"></i>
                        </button>
                    </div>
                  </div>
                </header>

                {/* Summary Cards */}
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                  <Card className="p-5 flex flex-col justify-between">
                    <div className="flex items-center justify-between text-gray-500 dark:text-gray-400 mb-2">
                      <span className="text-sm font-medium">Total Income</span>
                      <i className="ph ph-trend-up text-green-500 text-[18px]"></i>
                    </div>
                    <div className="text-2xl font-bold text-gray-900 dark:text-white">{formatCurrency(totalIncome)}</div>
                  </Card>

                  <Card className="p-5 flex flex-col justify-between">
                    <div className="flex items-center justify-between text-gray-500 dark:text-gray-400 mb-2">
                      <span className="text-sm font-medium">Total Expenses</span>
                      <i className="ph ph-trend-down text-red-500 text-[18px]"></i>
                    </div>
                    <div className="text-2xl font-bold text-gray-900 dark:text-white">{formatCurrency(totalExpenses)}</div>
                  </Card>

                  <Card className={`p-5 flex flex-col justify-between transition-colors duration-300 ${isOverBudget ? 'bg-red-50 dark:bg-red-950/40 border-red-200 dark:border-red-900/50 relative overflow-hidden' : ''}`}>
                    <div className="flex items-center justify-between text-gray-500 dark:text-gray-400 mb-2 z-10">
                      <span className="text-sm font-medium">
                        {filterMonth === 'all' && filterYear === 'all' && !listFilterDateFrom && !listFilterDateTo ? 'Remaining Balance' : 'Period Net Flow'}
                      </span>
                      {isOverBudget ? <i className="ph ph-warning-circle text-red-500 dark:text-red-400 text-[18px]"></i> : <i className="ph ph-wallet text-blue-500 dark:text-blue-400 text-[18px]"></i>}
                    </div>
                    <div className={`text-2xl font-bold z-10 ${isOverBudget ? 'text-red-600 dark:text-red-400' : 'text-gray-900 dark:text-white'}`}>
                      {formatCurrency(balance)}
                    </div>
                    {(filterMonth !== 'all' || filterYear !== 'all' || listFilterDateFrom || listFilterDateTo) && (
                      <div className="text-xs text-gray-500 dark:text-gray-400 mt-1 z-10 font-medium">
                        Total Balance: {formatCurrency(overallAccountBalance)}
                      </div>
                    )}
                    {isOverBudget && <div className="absolute inset-0 bg-red-500/10 dark:bg-red-500/5 animate-pulse z-0 pointer-events-none"></div>}
                  </Card>

                  <Card className="p-5 flex flex-col justify-between">
                    <div className="flex items-center justify-between text-gray-500 dark:text-gray-400 mb-2">
                      <span className="text-sm font-medium">Savings Rate</span>
                      <i className="ph ph-piggy-bank text-emerald-500 dark:text-emerald-400 text-[18px]"></i>
                    </div>
                    <div className="text-2xl font-bold text-gray-900 dark:text-white">{savingsRate}%</div>
                    <div className="w-full bg-gray-200 dark:bg-gray-700 h-1.5 rounded-full mt-3 overflow-hidden">
                      <div className={`h-full rounded-full ${isOverBudget ? 'bg-red-500' : 'bg-emerald-500'}`} style={{ width: `${Math.min(Math.max(savingsRate, 0), 100)}%` }}></div>
                    </div>
                  </Card>
                </div>

                {/* Status Messages */}
                {statusMessage && (
                  <div className={`px-4 py-3 rounded-lg flex items-center gap-3 ${statusMessage.type === 'success' ? 'bg-green-50 dark:bg-green-500/10 border border-green-200 dark:border-green-500/20 text-green-600 dark:text-green-400' : 'bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/20 text-red-600 dark:text-red-400'}`}>
                    <i className={`ph ${statusMessage.type === 'success' ? 'ph-check-circle' : 'ph-warning-circle'} text-[20px] shrink-0`}></i>
                    <p className="text-sm font-medium">{statusMessage.text}</p>
                  </div>
                )}
                {isOverBudget && !statusMessage && (
                  <div className="bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/20 text-red-600 dark:text-red-400 px-4 py-3 rounded-lg flex items-center gap-3">
                    <i className="ph ph-warning-circle text-[20px] shrink-0"></i>
                    <p className="text-sm font-medium">Alert: Your expenses have exceeded your income. Consider reviewing your budget.</p>
                  </div>
                )}

                {/* Main Grid: Form, Chart, History */}
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                  
                  {/* Left Column: Form */}
                  <Card className="p-6 lg:col-span-1 h-fit">
                    <h2 className="text-lg font-semibold mb-4 flex items-center gap-2 text-gray-900 dark:text-white">
                      <i className={`ph ${editingTransactionId ? 'ph-pencil-simple' : 'ph-plus'} text-gray-400 text-[20px]`}></i>
                      {editingTransactionId ? 'Edit Transaction' : 'New Transaction'}
                    </h2>
                    <form onSubmit={handleAddTransaction} className="space-y-4">
                      
                      <div className="flex p-1 bg-gray-100 dark:bg-gray-900 rounded-lg">
                        <button type="button" onClick={() => handleInputChange({ target: { name: 'type', value: 'expense', type: 'text' }})} className={`flex-1 py-2 text-xs sm:text-sm font-medium rounded-md transition-all ${formData.type === 'expense' ? 'bg-white dark:bg-gray-800 text-gray-900 dark:text-white shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white'}`}>Expense</button>
                        <button type="button" onClick={() => handleInputChange({ target: { name: 'type', value: 'income', type: 'text' }})} className={`flex-1 py-2 text-xs sm:text-sm font-medium rounded-md transition-all ${formData.type === 'income' ? 'bg-white dark:bg-gray-800 text-gray-900 dark:text-white shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white'}`}>Income</button>
                        <button type="button" disabled={accounts.length < 2} onClick={() => handleInputChange({ target: { name: 'type', value: 'transfer', type: 'text' }})} className={`flex-1 py-2 text-xs sm:text-sm font-medium rounded-md transition-all disabled:opacity-50 disabled:cursor-not-allowed ${formData.type === 'transfer' ? 'bg-white dark:bg-gray-800 text-gray-900 dark:text-white shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white'}`} title={accounts.length < 2 ? "Need at least 2 accounts" : ""}>Transfer</button>
                      </div>

                      {currentAccountId === 'all' && formData.type !== 'transfer' && (
                        <div className="animate-in fade-in slide-in-from-top-1">
                          <label className="block text-sm text-gray-500 dark:text-gray-400 mb-1">Account</label>
                          <select name="accountId" value={formData.accountId || accounts[0]?.id} onChange={handleInputChange} className="w-full bg-blue-50 dark:bg-gray-900 border border-blue-200 dark:border-blue-900 rounded-lg py-2 px-3 text-blue-900 dark:text-blue-100 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
                            {accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                          </select>
                        </div>
                      )}
                      
                      {currentAccountId === 'all' && formData.type === 'transfer' && (
                        <div className="animate-in fade-in slide-in-from-top-1">
                          <label className="block text-sm text-gray-500 dark:text-gray-400 mb-1">From Account</label>
                          <select name="fromAccountId" value={formData.fromAccountId || accounts[0]?.id} onChange={handleInputChange} className="w-full bg-blue-50 dark:bg-gray-900 border border-blue-200 dark:border-blue-900 rounded-lg py-2 px-3 text-blue-900 dark:text-blue-100 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
                            {accounts.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                          </select>
                        </div>
                      )}

                      <div>
                        <label className="block text-sm text-gray-500 dark:text-gray-400 mb-1">Amount</label>
                        <div className="relative">
                          <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500">{currencySymbol}</span>
                          <input type="text" name="amount" value={formData.amount} onChange={handleInputChange} placeholder="0.00 or =20+30" required className="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg py-2 pl-8 pr-3 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" />
                        </div>
                      </div>

                      {formData.type === 'transfer' ? (
                        <div>
                          <label className="block text-sm text-gray-500 dark:text-gray-400 mb-1">To Account</label>
                          <select name="toAccountId" value={formData.toAccountId} onChange={handleInputChange} className="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg py-2 px-3 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
                            <option value="" disabled>Select destination account</option>
                            {accounts.filter(a => a.id !== effectiveFromAccountId).map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                          </select>
                        </div>
                      ) : (
                        <div className="space-y-4">
                          <div>
                            <label className="block text-sm text-gray-500 dark:text-gray-400 mb-1">Category</label>
                            <select name="category" value={formData.category} onChange={handleInputChange} className="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg py-2 px-3 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
                              {(formData.type === 'expense' ? expenseCategories : incomeCategories).map(c => <option key={c.name} value={c.name}>{c.name}</option>)}
                            </select>
                          </div>
                          
                          {activeSubcategories.length > 0 && (
                            <div className="animate-in fade-in slide-in-from-top-1">
                              <label className="block text-sm text-gray-500 dark:text-gray-400 mb-1">Subcategory <span className="text-xs text-gray-400 dark:text-gray-500">(Optional)</span></label>
                              <select name="subcategory" value={formData.subcategory || ''} onChange={handleInputChange} className="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg py-2 px-3 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors">
                                <option value="">None</option>
                                {activeSubcategories.map(sub => <option key={sub.name} value={sub.name}>{sub.name}</option>)}
                              </select>
                            </div>
                          )}
                        </div>
                      )}

                      {(formData.type === 'income' || formData.type === 'transfer') && (
                        <div className="flex items-center gap-2 mt-1">
                          <input type="checkbox" id="isInvestment" name="isInvestment" checked={formData.isInvestment} onChange={handleInputChange} className="w-4 h-4 rounded border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 text-blue-600 focus:ring-blue-500 focus:ring-offset-white dark:focus:ring-offset-gray-900 cursor-pointer" />
                          <label htmlFor="isInvestment" className="text-sm text-gray-600 dark:text-gray-400 cursor-pointer select-none">Mark as Investment</label>
                        </div>
                      )}

                      <div>
                        <label className="block text-sm text-gray-500 dark:text-gray-400 mb-1">Description (Optional)</label>
                        <input type="text" name="description" value={formData.description} onChange={handleInputChange} placeholder="What was this for?" className="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg py-2 px-3 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" />
                      </div>

                      <div>
                        <label className="block text-sm text-gray-500 dark:text-gray-400 mb-1">Date</label>
                        <input type="date" name="date" value={formData.date} onChange={handleInputChange} className="w-full bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg py-2 px-3 text-gray-900 dark:text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors [color-scheme:light] dark:[color-scheme:dark]" />
                      </div>

                      <div className="flex gap-2 mt-2">
                        <button type="submit" disabled={formData.type === 'transfer' && !formData.toAccountId} className="flex-1 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white font-medium py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2">
                          <i className={`ph ${editingTransactionId ? 'ph-floppy-disk' : 'ph-plus'} text-[18px]`}></i>
                          {editingTransactionId ? 'Update' : 'Add'} {formData.type === 'income' ? 'Income' : formData.type === 'expense' ? 'Expense' : 'Transfer'}
                        </button>
                        {editingTransactionId && (
                          <button type="button" onClick={handleCancelEdit} className="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 text-gray-800 dark:text-white font-medium px-4 py-2.5 rounded-lg transition-colors">Cancel</button>
                        )}
                      </div>
                    </form>
                  </Card>

                  {/* Middle/Right Column: Chart and List */}
                  <div className="lg:col-span-2 space-y-6">
                    
                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                      <Card className="p-6 flex flex-col">
                        <div className="flex items-center justify-between mb-6 gap-4">
                          <div className="flex items-center gap-2">
                              {selectedParentCategory && (
                                <button onClick={() => { setSelectedParentCategory(null); setListFilterCategory('all'); setListFilterSubcategory('all'); }} className="p-1 hover:bg-gray-100 dark:hover:bg-gray-800 rounded text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors" title="Back to All Categories">
                                  <i className="ph ph-caret-left text-[18px]"></i>
                                </button>
                              )}
                              <h2 className="text-lg font-semibold flex items-center gap-2 text-gray-900 dark:text-white">
                                <i className="ph ph-chart-pie-slice text-gray-400 text-[20px]"></i>
                                {selectedParentCategory ? `${selectedParentCategory} Breakdown` : 'Spending Breakdown'}
                              </h2>
                          </div>
                        </div>
                        
                        <div className="flex flex-col items-center justify-center gap-6 flex-1">
                          <div className="w-full flex justify-center shrink-0">
                            {renderDonutChart(currentLevelTotal, currentLevelData, 'No expenses in\nselected period', 'ph-chart-pie-slice')}
                          </div>
                          <div className="w-full max-h-32 overflow-y-auto pr-2 space-y-2 custom-scrollbar">
                            {currentLevelData.length > 0 ? currentLevelData.map((category) => (
                              <div key={category.name} className={`flex items-center justify-between p-1.5 -mx-1.5 rounded-lg ${category.onClick ? 'hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer group' : ''}`} onClick={category.onClick}>
                                <div className="flex items-center gap-2">
                                  <div className="w-6 h-6 rounded-full shrink-0 flex items-center justify-center border border-black/10 dark:border-gray-600/50" style={{ backgroundColor: category.color }}>
                                    {category.icon ? <i className={`ph ${category.icon} text-white text-xs`}></i> : <div className="w-2 h-2 rounded-full bg-white/50"></div>}
                                  </div>
                                  <span className={`text-sm text-gray-700 dark:text-gray-300 truncate ${category.onClick ? 'group-hover:text-gray-900 dark:group-hover:text-white' : ''}`} title={category.name}>{category.name}</span>
                                </div>
                                <div className="text-sm font-medium text-gray-900 dark:text-white pl-2 shrink-0 flex items-center gap-1">
                                  {formatCurrency(category.value)}
                                  {category.onClick ? <i className="ph ph-caret-right text-gray-400 dark:text-gray-500 group-hover:text-gray-700 dark:group-hover:text-gray-300 ml-1"></i> : <div className="w-4"></div>}
                                </div>
                              </div>
                            )) : <div className="text-sm text-gray-500 text-center">No categories to display</div>}
                          </div>
                        </div>
                      </Card>

                      <Card className="p-6 flex flex-col">
